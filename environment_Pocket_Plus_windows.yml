# Notes
# 1. This file records the actual installed Windows environment that was created successfully on 2026-03-23.
# 2. `flash-attn` is intentionally not included because the Windows path for this project was validated without it.
# 3. `torch-scatter` and `torch-cluster` are installed from the official PyG wheel index via `--find-links`.
# 4. `spconv-cu120` is installed from PyPI and has been validated in this Windows environment.
