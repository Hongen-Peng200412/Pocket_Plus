batch_size: 4
num_workers: 10
dataloader_backend: auto
pin_memory: true
max_epochs: 100
devices: 1
accelerator: auto
nnodes: 1
ddp_find_unused_parameters: false
precision: bf16-mixed
gradient_clip_val: 0.5
accumulate_grad_batches: 4
check_val_every_n_epoch: 1
log_every_n_steps: 5
optimizer:
  _target_: torch.optim.AdamW
  _partial_: true
  lr: 2.0e-05
  weight_decay: 0.01
scheduler:
  _target_: torch.optim.lr_scheduler.ReduceLROnPlateau
  _partial_: true
  mode: max
  factor: 0.5
  patience: 10
  threshold: 0.001
  threshold_mode: rel
  min_lr: 1.0e-07
