# @package _global_
# ============================================================
# 损失函数变体: UnifiedCompositeLoss (统一复合损失)
# 使用硬标签 Focal + 硬标签 Dice/Tversky，同时服务 voxel_aux、voxel_ligand 分支
#
# 与 focal_tversky.yaml 的区别:
#   - 使用新的 UnifiedCompositeLoss 替代 FocalTverskyCombinedLoss
#   - 新增 voxel_ligand_loss 分支 (体素级 ligand 占据预测)
#   - Focal 部分不使用旧版的 from_logits/ignore_index/flatten_count/use_adaptive_alpha
#   - 新增 w_mse 权重 (默认关闭)
# ============================================================
model:
  # --- 受体原子损失 ---
  # atom_loss:
  #   _target_: src.modules.losses.UnifiedCompositeLoss
  #   sigma: 2.0                     # float, 软标签 σ (atom 分支不使用, 但须传入)
  #   hard_label_threshold: null     # null=硬标签从外部 target 读取
  #   focal_gamma: 2.0               # float, focal 聚焦参数
  #   focal_alpha_neg: 0.5          # float, 背景 alpha
  #   focal_alpha_pos: 0.5          # float, 前景 alpha
  #   focal_eps: 1.0e-6              # float, 数值稳定 eps
  #   tversky_alpha: 0.5             # float, FP 惩罚; α=β=0.5 等价 Dice
  #   tversky_beta: 0.5              # float, FN 惩罚
  #   tversky_smooth: 1.0            # float, 拉普拉斯平滑 (nnU-Net 默认)
  #   w_focal: 0.8                   # float, focal 权重
  #   w_tversky: 0.2                 # float, tversky 权重
  #   w_mse: 0.0                     # float, MSE 权重 (atom 分支关闭)
  # atom_loss_weight: 0.1            # float, atom 损失总权重


  # --- 体素辅助损失 (口袋预测) ---
  voxel_aux_loss:
    _target_: src.modules.losses.UnifiedCompositeLoss
    sigma: 2.0
    hard_label_threshold: null     # null=从 voxel_label 读取硬标签
    focal_gamma: 2.0
    focal_alpha_neg: 0.5
    focal_alpha_pos: 0.5
    focal_eps: 1.0e-6
    tversky_alpha: 0.5
    tversky_beta: 0.5
    tversky_smooth: 1.0
    w_focal: 0.7
    w_tversky: 0.3
    w_mse: 0.0                     # float, 口袋分支关闭 MSE
    focal_soft_negative_suppression: false
    tversky_soft_target: false
  voxel_aux_loss_weight: 0.1       # float, 体素辅助损失权重


  # --- 体素 ligand 占据损失 (新增) ---
  voxel_ligand_loss:
    _target_: src.modules.losses.UnifiedCompositeLoss
    sigma: 2.0                     # float, 仅在软目标开关开启时使用；本配置关闭软化
    hard_label_threshold: 1.7      # float, 距离 < 1.7Å 的体素为正类
    focal_gamma: 2.0
    focal_alpha_neg: 0.5
    focal_alpha_pos: 0.5
    focal_eps: 1.0e-6
    tversky_alpha: 0.5
    tversky_beta: 0.5
    tversky_smooth: 1.0
    w_focal: 0.7
    w_tversky: 0.3
    w_mse: 0.0                     # float, ligand 分支关闭 MSE
    focal_soft_negative_suppression: false
    tversky_soft_target: false
  voxel_ligand_loss_weight: 1.0    # float, 体素 ligand 损失权重
