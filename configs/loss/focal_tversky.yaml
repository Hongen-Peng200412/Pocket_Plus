# @package _global_
# ============================================================
# 损失函数变体: Focal + Tversky 联合损失 (nnU-Net 风格)
# 此文件以 cfg.model.atom_loss / cfg.model.voxel_aux_loss 的形式被 Wrapper 使用
#
# α=β=0.5 时 Tversky Loss 退化为标准 Dice Loss。
# 调节建议:
#   - 若训练中出现大量漏报 (FN 多): 调高 tversky_beta (0.5→0.7)
#   - 若训练中出现大量误报 (FP 多): 调高 tversky_alpha (0.5→0.7)
#   - focal_weight / dice_weight 默认 1:1，可按实验效果调整
# ============================================================
model:
  atom_loss:
    _target_: src.modules.losses.FocalTverskyCombinedLoss
    gamma: 2.0                     # float, Focal 聚焦参数, 典型范围 1.0-3.0
    ignore_index: null
    eps: 1.0e-6
    scale: 1.0
    alpha_tune: [0.75, 0.25]       # list[float], [背景, 前景] Focal 权重
    use_adaptive_alpha: false
    focal_weight: 1.0              # float, Focal 损失权重
    dice_weight: 1.0               # float, Tversky 损失权重
    tversky_alpha: 0.5             # float, FP 惩罚系数; α=β=0.5 等价于 Dice
    tversky_beta: 0.5              # float, FN 惩罚系数
    tversky_smooth: 1.0            # float, 拉普拉斯平滑项 (nnU-Net 默认 1.0)

  atom_loss_weight: 1.0            # float, atom 损失总权重

  voxel_aux_loss:
    _target_: src.modules.losses.FocalTverskyCombinedLoss
    gamma: 2.0
    ignore_index: null
    eps: 1.0e-6
    scale: 1.0
    alpha_tune: [0.75, 0.25]
    use_adaptive_alpha: false
    focal_weight: 1.0
    dice_weight: 1.0
    tversky_alpha: 0.5
    tversky_beta: 0.5
    tversky_smooth: 1.0

  voxel_aux_loss_weight: 0.1       # float, 体素辅助损失权重
