# ============================================================
# voxel-only ligand 单样本推理配置
# 此文件由 src/inference/main/run.py 通过 Hydra 加载:
#   python src/inference/main/run.py --config=voxel_single ...
# run.py 会先加载 checkpoint 与训练期 dataset 配置, 再分发到
# voxel_pipeline.run_voxel_single() 执行:
#   1. 生成或读取 GPU forward 概率缓存
#   2. 对 ligand 概率图做 voxel-only 后处理
#   3. 可选评估 GT 与导出可视化
# NOTE: single 模式要求滑窗/BOX 聚合参数由 CLI 或本文件显式提供;
#       因此 window_size/stride/batch_size/merge_mode/core_offset 使用 ??? fail-fast。
# ============================================================

# --- 运行模式 ---
mode: "voxel_single"  # str, 固定为 voxel_single; → run.py: main() 分发到 run_voxel_single()

# --- 模型与输入路径 ---
ckpt_path: null          # str|null, Lightning checkpoint 路径; → run.py: load_model()/load_training_config() 都会读取; 运行时必须显式覆盖
backbone_override: null  # dict|null, 可选 backbone 覆盖配置; 若提供则覆盖 checkpoint 中恢复的 backbone, 格式需满足 Hydra instantiate
cif_path: null           # str|null, 输入结构文件路径; → _build_cache_or_forward(): load_from_raw_cif()/load_ligand_gt_from_structure()/build_infer_vis_bundle()
map_path: null           # str|null, 输入实验密度图路径; → _build_cache_or_forward(): load_from_raw_cif(), 可视化阶段也会再次读取
sim_map_path: null       # str|null, 可选模拟密度图路径; 仅当 density_channel_config 实际启用 sim/diff/posdiff 通道时才会被读取
cif_gt_path: null        # str|null, 可选真实结构路径; eval_gt=true 且走 structure GT 时传给 load_ligand_gt_from_structure(); 可视化也会读取
labels_npz_path: null    # str|null, 可选 Make_Data 预计算 labels.npz 路径
                         # → _resolve_gt_source(): eval_gt=true 且该值非 null 时优先走 labels_npz GT; 否则退回 structure GT
sample_name: null        # str|null, 输出样本名; null 时 → _resolve_sample_name(): 回退为 Path(cif_path).stem

# --- 计算与输出目录 ---
device: "cuda:0"                           # str, 推理设备; → run.py: torch.device(device)
output_root: "inference_output/voxel_single"  # str, 单样本输出根目录; 实际结果目录为 output_root/sample_name
cache_root: "inference_output/voxel_cache"    # str, GPU forward 缓存根目录; → _resolve_cache_path(): 固定写为 cache_root/sample_name.npz
use_cache: true                            # bool, 若 cache_root/sample_name.npz 已存在则直接读取缓存, 跳过重新 forward
save_cache: true                           # bool, 首次 forward 后是否保存 .npz 缓存; false 时结果只保存在内存, 本次运行结束后不会留下缓存文件
show_progress: true                        # bool, 是否为 BOX forward 显示 tqdm 进度条; → get_voxel_pred(show_progress=...)

# --- raw 输入构造参数 ---
# 下列字段统一传给 load_from_raw_cif() 构造重采样密度图、原子特征和 BOX 切分输入。
target_voxel_size: 1.0       # float, 密度图重采样目标体素大小
compute_density: true        # bool, 是否在 get_features_when_infer() 中计算原子局部密度特征
select_first_model: false    # bool, 多 model CIF 的处理策略; false 时通常要求输入结构本身只有一个 model
error_dir: null              # str|null, 结构解析或 GT 构造失败时的错误输出目录
filter_preset: "five_class"  # str, structure GT 与可视化导出时使用的配体筛选预设名

# --- 可由训练 dataset 配置回退的字段 ---
# run.py 会先把 checkpoint 对应训练配置中的 dataset 节写入 `_train_dataset_cfg`;
# _get_cfg() 读取这组字段时遵循“推理 YAML 显式值优先, 否则回退到训练 dataset 配置”的顺序。
density_channel_config: null  # dict|null, null 时回退到训练 dataset.density_channel_config; 同时决定是否真正需要 sim_map_path
atom_buffer_radius: null      # float|null, null 时回退到训练 dataset.atom_buffer_radius; → split_volume_to_boxes()
valid_crop_margin: null       # int|null, null 时回退到训练 dataset.valid_crop_margin; → split_volume_to_boxes()
class_mapping: null           # list[int]|null, null 时回退到训练 dataset.class_mapping; labels_npz GT / structure GT / 可视化都会读取

# --- BOX 滑窗与整图合并参数 (single 模式必须显式提供) ---
# 下列字段统一参与两步:
#   1. split_volume_to_boxes(): 切出 BOX
#   2. get_voxel_pred(): 对所有 BOX forward 并合并回整图概率图
window_size: ???            # int, BOX 边长(voxel); single 模式必须在本文件或 CLI 中显式提供
stride: ???                 # int, 滑窗步长(voxel); single 模式必须显式提供
batch_size: ???             # int, 每批送入 GPU forward 的 BOX 数; single 模式必须显式提供
merge_mode: ???             # str, BOX 合并策略; 可选 mean/max; single 模式必须显式提供
core_offset: ???            # int, 非边界侧裁剪厚度; 0 表示不裁剪; single 模式必须显式提供
gaussian_sigma_ratio: null  # float|null, BOX 合并时的 Gaussian 衰减 sigma 比例; null 表示不启用衰减
output_heads: ["ligand"]    # list[str], 需要从模型输出中提取并合并的 voxel head; 允许 ligand/receptor, 当前粗定位默认只保留 ligand

# --- ligand 概率图后处理 ---
# 下列字段统一由 _postprocess_params_from_cfg() 收集为 `post_params`,
# 再传入 postprocess_ligand_probability_map(...) 对整图 ligand 概率做 voxel-only 后处理。
filter_strength: "basic"      # str, 候选过滤强度档位; basic 仅做基础阈值+连通域过滤, advanced 继续叠加响应分数过滤
threshold: 0.5                # float, ligand 概率二值化阈值
min_component_voxels: 10      # int, 连通域最小体素数
connectivity_policy: "7_none" # str, 两阶段连通域邻接策略; 形如 first_second, 例如 7_none
sigma_nearby: 1.0             # float, advanced 模式下 ligand 邻域平滑 sigma
kernel_nearby: 3              # int, advanced 模式下 ligand 邻域平滑核大小
sigma_response: 1.0           # float, advanced 模式下 receptor response 平滑 sigma
kernel_response: 3            # int, advanced 模式下 receptor response 平滑核大小
score_add: 1.0                # float, advanced 模式下 receptor 正向响应加分系数
score_minus: 1.0              # float, advanced 模式下 receptor 负向响应扣分系数
voxel_score_min: 0.0          # float, advanced 模式下体素级分数阈值
instance_score_min: 0.0       # float, advanced 模式下实例级均分阈值

# --- GT 评估 ---
# GT 来源由 _resolve_gt_source() 决定:
#   - eval_gt=false: 不构造 GT
#   - eval_gt=true 且 labels_npz_path 非 null: 走 labels_npz GT
#   - eval_gt=true 且 labels_npz_path 为 null: 走 structure GT
eval_gt: false                    # bool, 是否构造 GT 并计算 voxel / instance 指标
eval_mode: "easy"                 # str, structure GT 模式; easy 使用 cif_path, hard 使用 cif_gt_path, trivial 使用真实结构自评
ligand_gt_distance_threshold: 1.7 # float, ligand GT 距离阈值(Å); 与训练 voxel_ligand_loss.hard_label_threshold 对齐
alpha: 0.6                        # float, instance precision 判定中的包含率阈值
beta: 0.6                         # float, instance recall 判定中的包含率阈值

# --- 可视化 ---
# run_voxel_single() 只有在 `vis_enable=true` 且 `vis_output_root` 非 null 时才调用 build_infer_vis_bundle()。
vis_enable: true        # bool, 是否在单样本成功后额外导出 map/cif 可视化资产
vis_output_root: null   # str|null, 可视化输出根目录; null 时即使 vis_enable=true 也会跳过可视化

# --- Hydra 运行目录行为 ---
hydra:
  job:
    chdir: false  # bool, 保持进程 cwd 不被 Hydra 自动切换; 方便相对路径按项目根目录解析
