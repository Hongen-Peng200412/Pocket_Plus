# =============================================================================
# 基于原始文件结构的批量推断配置 (Raw Structure Batch Inference Configuration)
# =============================================================================
# 此文件供 src/inference/run.py 使用，通过 Hydra 加载:
#   python src/inference/run.py --config-name=raw_batch +raw_pairs="..."
# =============================================================================

# --- 运行模式 ---
# mode: str, 标量
#   传入: run.py main() 分流执行 _run_raw_batch_mode()
#   作用: 运行模式。指定代码执行基于原始 CIF/MAP 文件夹的自动化批量流水线。
mode: "raw_batch"


# --- 输入数据 (raw_pairs) ---
# raw_pairs: str, JSON 路径
#   传入: run.py 解析名单三元组 (cif, map, cif_gt)
#   作用: 推断名单索引。支持场景B：使用建模结构提特征，结合真实结构进行性能评估。
#         需通过 yield_json_from_raw_sample.py 预先生成。
raw_pairs: "/home/penghongen/My_Project/Pocket/src/inference/utils/for_v0_search.json"


# --- 动态数据处理特征 ---
# target_voxel_size: float, 标量 (Å)
#   传入: parse_input.load_from_raw_cif() -> make_model_grid()
#   作用: 体素重采样尺度。强制将原始 .map 重采样为指定的物理分辨率。
target_voxel_size: 1.0

# compute_density: bool, 标量
#   传入: get_features_when_infer(compute_density=...)
#   作用: 原子密度地图。是否将三维原子分布作为辅助特征通道。需与训练一致。
compute_density: true

# select_first_model: bool, 标量
#   传入: get_features_when_infer(select_first_model=...) 
#   作用: 结构截断方案。多模型结构中仅取第一个模型，避免原子过度堆积导致特征冲突。
select_first_model: false


# --- GT 标签提取与评估参数 ---
# eval_gt: bool, 标量
#   传入: run.py 触发加载器 load_gt_from_structure()
#   作用: 批量自动评估。不仅推断结果，还将实时对比真值并打印 Accuracy、汇总 Excel 分数。
eval_gt: false

# filter_preset: str, 标量
#   传入: filter_config.py 规则映射
#   作用: 配体判定规则。决定哪些非蛋白质原子应被视为 GT 口袋标签。
filter_preset: "binary"

# class_mapping: list[int] | null
#   传入: load_gt_from_structure()
#   作用: 标签数值替换表。修正及合并原始库读取的口袋类别。
class_mapping: [0, 1, 1, 1, 1]

# dist_threshold: float, 标量 (Å)
#   传入: semantic_evaluate(dist_threshold=...)
#   作用: 点云命中容忍度。确定预测中心点与 GT 中心点多近算成功。
dist_threshold: 3.0

# error_dir: str | null
#   传入: run_raw_pipeline() 异常处理
#   作用: 错误持久化地址。汇总所有无法读取的 CIF 错误日志。
error_dir: null


# --- 模型权重 ---
# ckpt_path: str, 标量
#   传入: get_pred.load_model()
#   作用: 神经网络核心权重。
ckpt_path: "/home/penghongen/My_Project/feedback/logs/RAUNet-MyDatasets_half_1-none/half_1____2026-03-04_17-35-26/checkpoints/last.ckpt"

# backbone_override: dict | null
#   传入: get_pred.load_model()
#   作用: 网络结构微调。手动指定 Backbone 细节。
backbone_override: null


# --- 计算设备 ---
# device: str, 标量
#   作用: 后端计算卡（CUDA/CPU）调度。
device: "cuda:0"


# --- 输出路径 ---
# output_root: str, 标量
#   传入: write_batch_excel() 及汇总逻辑
#   作用: 推断汇总目录。
output_root: "inference_output/raw_batch"


# --- 可视化配置 ---
# vis_enable: bool
#   传入: _build_vis_bundle_safe()
#   作用: 可视化总闸。
vis_enable: true

# vis_output_root: str | null
#   作用: 存储可视化产物。默认建议设为 `${output_root}/vis`。
vis_output_root: null


# --- 模型执行参数 ---
# batch_size: int, 标量
#   作用: 并发度。
batch_size: 1

# stride: int, 标量 (像素)
#   作用: 窗口位移速率。
stride: 32

# window_size / windows_size: int, 标量 (像素)
#   作用: 模型输入感知范围。
windows_size: 48

# core_offset: int, 标量 (像素)
#   作用: 舍弃不可信边界框。
core_offset: 2

# threshold: float, 标量
#   作用: 分割概率线。大于此值通过。
threshold: 0.5

# merge_mode: str, 鏍囬噺
#   浼犲叆: run.py _run_raw_batch_mode() -> run_raw_point_pipeline(merge_mode=...) -> merge_box_atom_results()
#   浣滅敤: 澶?BOX 鍘熷瓙棰勬祴鑱氬悎绛栫暐銆? "logit_mean" 琛ㄧず鍏堝姞鏉冨钩鍧?logit 鍐嶅仛 sigmoid;
#         "prob_mean" 琛ㄧず鍏堟妸姣忎釜 BOX 鐨?logit 杞负 prob, 鍐嶅姞鏉冨钩鍧?prob銆?
merge_mode: "logit_mean"

# semantic_segment_method: str, 鏍囬噺
#   浼犲叆: run.py _run_raw_batch_mode() -> run_raw_point_pipeline(semantic_segment_method=...) -> point_semantic_segment()
#   浣滅敤: 鍘熷瓙姒傜巼 -> 璇箟鍒嗗壊鐨勬€诲叆鍙ｃ€? "threshold" 琛ㄧず浠呭仛闃堝€间簩鍊煎寲;
#         "dbscan" 琛ㄧず鍦ㄩ槇鍊煎悗鍐嶇敤 DBSCAN 鍘婚櫎瀛ょ珛鐐广€?
semantic_segment_method: "threshold"

# dbscan_eps: float, 鏍囬噺 (脜)
#   浼犲叆: point_semantic_segment(dbscan_eps=...)
#   浣滅敤: DBSCAN 鍗婂緞鍙傛暟 eps銆備粎鍦?semantic_segment_method="dbscan" 鏃剁敓鏁堛€?
dbscan_eps: 2.0

# dbscan_min_samples: int, 鏍囬噺
#   浼犲叆: point_semantic_segment(dbscan_min_samples=...)
#   浣滅敤: DBSCAN 鐨勬牳蹇冪偣鏈€灏戦偦灞呮暟銆備粎鍦?semantic_segment_method="dbscan" 鏃剁敓鏁堛€?
dbscan_min_samples: 3

# point_assign_* 系列: float, 标量 (Å)
#   传入: assign_prob_to_atoms() 后处理
#   作用: 控制三维体素概率汇总到原子层级点云的具体半径与权重。推荐缺省值：2.0/1.0/0.5/0.35/0.15。
point_assign_radius: 2.0
point_assign_sigma: 1.0
point_cat_weight_home: 0.5
point_cat_weight_has_atom: 0.35
point_cat_weight_no_atom: 0.15


# --- Hydra 行为控制 ---
hydra:
  job:
    chdir: false
