# =============================================================================
# 基于原始文件结构的批量推断配置 (Raw Structure Batch Inference Configuration)
# =============================================================================
# 此文件供 src/inference/run.py 使用，通过 Hydra 加载:
#   python src/inference/run.py --config=raw_batch \
#       "raw_pairs_json=/path/to/pairs.json" "ckpt_path=..."
# 此文件的所有配置项以 cfg.* 的形式被 run.py main() → _run_raw_batch_mode() 消费
# =============================================================================

# --- 运行模式 ---
# mode: str, 标量
#   → run.py main(): 按此字段分流到 _run_raw_batch_mode()
#   作用: 指定代码执行基于原始 CIF/MAP 文件夹的自动化批量流水线。
mode: "raw_batch"


# --- 输入数据 ---
# raw_pairs_json: str, JSON 路径
#   → run.py _run_raw_batch_mode(): cfg_dict.get("raw_pairs_json")
#   → load_raw_pairs(raw_pairs_json) 解析名单三元组 (cif_path, map_path, cif_gt_path)
#   作用: 推断名単索引。支持场景B：使用建模结构提特征，结合真实结构做评估。
#         需通过 src/inference/utils/yield_json_from_raw_sample.py 预先生成。
raw_pairs_json: "/home/penghongen/My_Project/Pocket/src/inference/utils/for_v0_search.json"


# --- 模型权重 ---
# ckpt_path: str, 标量
#   → run.py main() → get_pred.load_model(ckpt_path=...)
#   作用: 神经网络核心权重。Lightning checkpoint (.ckpt) 路径。
ckpt_path: null

# backbone_override: dict | null
#   → run.py main() → get_pred.load_model(backbone_override=...)
#   作用: 网络结构微调。手动指定 Backbone 细节。通常不需要。
backbone_override: null


# --- 计算设备 ---
# device: str, 标量
#   → run.py main(): torch.device(device)
#   作用: 后端计算卡（CUDA/CPU）调度。
device: "cuda:0"


# --- 输出路径 ---
# output_root: str, 标量
#   → run.py _run_raw_batch_mode(output_root=...)
#   作用: 推断汇总目录。每个样本保存在 {output_root}/{sample_name}/ 之下;
#         批量评估完成后 Excel 汇总也保存在 {output_root}/ 内。
output_root: "inference_output/raw_batch"


# --- 动态数据处理特征 ---
# target_voxel_size: float, 标量 (Å)
#   → run_raw_point_pipeline() → load_from_raw_cif() → make_model_grid()
#   作用: 体素重采样尺度。强制将原始 .map 重采样为指定的物理分辨率。
target_voxel_size: 1.0

# compute_density: bool, 标量
#   → run_raw_point_pipeline() → load_from_raw_cif(compute_density=...)
#   作用: 原子密度地图。是否将三维原子分布作为辅助特征通道。需与训练一致。
compute_density: true

# select_first_model: bool, 标量
#   → run_raw_point_pipeline() → load_from_raw_cif(select_first_model=...)
#   作用: 结构截断方案。多模型结构中仅取第一个模型，避免原子过度堆积导致特征冲突。
select_first_model: false


# --- GT 标签提取与评估参数 ---
# eval_gt: bool, 标量
#   → run.py _run_raw_batch_mode() → run_raw_point_pipeline(eval_gt=...)
#   → 触发 load_gt_from_structure() 加载真值
#   作用: 批量自动评估。开启后不仅推断结果，还将实时对比真值并打印 Accuracy、汇总 Excel 分数。
eval_gt: false

# eval_mode: str, 标量
#   → _run_raw_batch_mode(): 编排评估模式
#   → run_raw_point_pipeline(eval_mode=...) → load_gt_from_structure(eval_mode=...)
#   作用: 评估难度模式。
#     "trivial": 忽略 cif_gt_path, 完全使用 cif_path 提取配体和受体; 适用于 cif_path 本身就是真实结构的场景
#     "easy": cif_gt_path 仅提供配体信息, 结合位点标注基于 cif_path (预测受体), 降低评估难度
#     "hard": cif_gt_path 同时提供配体信息和受体结构, 结合位点标注基于真实受体,
#             模型预测原子与真实结合原子直接通过 dist_threshold 进行距离匹配评估
#     "all":  先后运行 easy、hard、trivial 三种模式 (模型推断只执行一次);
#             输出路径自动分裂为 {output_root}_easy / {output_root}_hard / {output_root}_trivial,
#             {vis_output_root}_easy / {vis_output_root}_hard / {vis_output_root}_trivial
#   注意: "all" 仅在 raw_single / raw_batch 模式下可用; raw_param_search 不支持
eval_mode: "easy"

# filter_preset: str, 标量
#   → run_raw_point_pipeline(filter_preset=...)
#   → load_gt_from_structure(filter_preset=...) → filter_config.py 规则映射
#   作用: 配体判定规则。决定哪些非蛋白质原子应被视为 GT 口袋标签。
filter_preset: "five_class"

# dist_threshold: float, 标量 (Å)
#   → run_raw_point_pipeline(dist_threshold=...) → semantic_evaluate(dist_threshold=...)
#   作用: 点云命中容忍度。确定预测中心点与 GT 中心点多近算成功。
dist_threshold: 3.0

# error_dir: str | null
#   → run_raw_point_pipeline(error_dir=...) 异常处理
#   作用: 错误持久化地址。汇总所有无法读取的 CIF 错误日志。
error_dir: null

# --- 以下参数已自动从训练 config.yaml 的 dataset.* 中读取 ---
# 推理时 _get_cfg() 优先读推理 YAML, 不存在则回退到训练 dataset 配置。
# 如需在推理时覆盖训练值, 可取消注释并显式设置:
# class_mapping: [0, 1, 1, 1, 1]
# atom_buffer_radius: 4.0
# valid_crop_margin: 0
# emdb_z_score: 1


# --- 模型执行参数 ---
# batch_size: int, 标量
#   → run_raw_point_pipeline(batch_size=...) → prepare_batched_boxes()
#   作用: 并发度。每个推断 batch 包含的 BOX 数目。
batch_size: 1

# stride: int, 标量 (voxel)
#   → run_raw_point_pipeline(stride=...) → split_volume_to_boxes(stride=...)
#   作用: 窗口位移速率。越小重叠越密、推断量越大。
stride: 32

# windows_size: int, 标量 (voxel)
#   → run_raw_point_pipeline(windows_size=...) → split_volume_to_boxes(window_size=...)
#   作用: 模型输入感知范围。须与训练 BOX 大小对齐。
windows_size: 48

# threshold: float, 标量
#   → run_raw_point_pipeline(threshold=...) → point_semantic_segment(threshold=...)
#   作用: 分割概率线。大于此值通过。
threshold: 0.5


# --- 点云推断聚合参数 ---
# core_decay_mode: str, 标量
#   → run_raw_point_pipeline(core_decay_mode=...) → merge_box_atom_results()
#   作用: 核心区信度衰减方式。"hard" / "linear" / "none"。
core_decay_mode: "linear"

# core_offset: int, 标量 (voxel)
#   → run_raw_point_pipeline(core_offset=...) → merge_box_atom_results()
#   作用: 裁边厚度。将各个 BOX 边缘部分认定为不稳定，并在聚合时减权或裁边。
core_offset: 2

# box_spatial_weight_sigma_ratio: float, 标量
#   → run_raw_point_pipeline(box_spatial_weight_sigma_ratio=...)
#   → merge_box_atom_results(box_spatial_weight_sigma_ratio=...)
#   作用: 空间权重高斯核 sigma = sigma_ratio × 密度图最大半径。
#         1.0 衰减缓, 0.3 衰减快。用于多角度重叠原子的归一化信任分布修正。
box_spatial_weight_sigma_ratio: 0.5

# merge_mode: str, 标量
#   → run_raw_point_pipeline(merge_mode=...) → merge_box_atom_results()
#   作用: 多 BOX 原子预测聚合策略。默认 "logit_mean" 先加权平均 logit 再做 sigmoid;
#         "prob_mean" 表示先把每个 BOX 的 logit 转为 prob, 再加权平均 prob。
merge_mode: "logit_mean"

# semantic_segment_method: str, 标量
#   → run_raw_point_pipeline(semantic_segment_method=...) → point_semantic_segment()
#   作用: 原子概率 → 语义分割的总入口。"threshold" 表示仅做阈值二值化;
#         "dbscan" 表示在阈值后再用 DBSCAN 去除孤立点。
semantic_segment_method: "threshold"

# dbscan_eps: float, 标量 (Å)
#   → point_semantic_segment(dbscan_eps=...)
#   作用: DBSCAN 半径参数 eps。仅在 semantic_segment_method="dbscan" 时生效。
dbscan_eps: 2.0

# dbscan_min_samples: int, 标量
#   → point_semantic_segment(dbscan_min_samples=...)
#   作用: DBSCAN 的核心点最少邻居数。仅在 semantic_segment_method="dbscan" 时生效。
dbscan_min_samples: 3


# --- 可视化配置 ---
# vis_enable: bool, 标量
#   → _build_vis_bundle_safe(cfg_dict)
#   作用: 可视化总闸。控制是否在每个样本推断完成后生成 PyMol session。
vis_enable: true

# vis_output_root: str | null
#   → _build_vis_bundle_safe(cfg_dict): 可视化输出根目录
#   作用: 存储可视化产物。null 则跳过。
vis_output_root: null

# vis_subdir: str | null
#   → _build_vis_bundle_safe(cfg_dict): 可视化子目录
#   作用: 非 null 时输出到 {vis_output_root}/{vis_subdir}/{pdb_id}/ 之下。
# vis_subdir: null


# --- Hydra 行为控制 ---
hydra:
  job:
    chdir: false
