# =============================================================================
# 基于原始文件结构的网格调参搜寻配置 (Raw Structure Parameters Sweep Configuration)
# =============================================================================
# 此文件供 src/inference/run.py 使用，通过 Hydra 加载:
#   python src/inference/run.py --config-name=raw_param_search +ckpt_path="..."
#
# 该模式提供完全脱离 BOX NPZ 处理体系的数据流，在提供 JSON 名单及目标文件夹后，
# 它会自动计算每一对(CIF, MAP)的 GT 并对后处理参数如 threshold 等等作笛卡尔积测试
# 以最优化的 avg_F1 为导向寻找最佳后处理参数，并汇总到 param_search_results.xlsx 中！
# =============================================================================


# --- 运行模式 ---
# mode: str, 标量
#   传入: run.py main() 分流执行 _run_raw_param_search_mode()
#   作用: 运行模式。指定代码执行基于原始文件（CIF/MAP）的网格调参搜寻逻辑
mode: "raw_param_search"


# --- 输入数据 (raw_pairs) ---
# raw_pairs: str, JSON 路径
#   传入: run.py _run_raw_param_search_mode() 加载该 JSON 获取样本对
#   作用: 输入数据名单。JSON 中每项包含 {"cif_path": ..., "map_path": ...[, "cif_gt_path": ...]}。
#         可通过 src/inference/utils/yield_json_from_raw_sample.py 生成。
#         支持场景B：使用 cif_path 提特征，cif_gt_path 提 GT 标签进行评估。
raw_pairs: "/home/penghongen/My_Project/Pocket/src/inference/utils/for_v0_search.json"


# --- 动态数据处理特征 ---
# target_voxel_size: float, 标量 (Å)
#   传入: parse_input.load_from_raw_cif() 的重采样函数 make_model_grid(target_voxel_size=...)
#   作用: 实时重采样目标体素大小。控制 .map 体素精度分辨率强制统一定位至该数值，决定生成网格的物理分辨率尺寸。
target_voxel_size: 1.0

# compute_density: bool, 标量
#   传入: parse_input.load_from_raw_cif() -> get_features_when_infer(compute_density=...)
#   作用: 原子局部密度特征计算开关。是否将 PDB 局部密度作为 49 维原子通道加入特征张量。需与模型训练设定一致。
compute_density: true

# select_first_model: bool, 标量
#   传入: parse_input.load_from_raw_cif() -> get_features_when_infer(select_first_model=...) 
#   作用: 多模型选择策略。对于含复数 Models 的 CIF 文件，若为 True 则只读取首个模型的原子，避免多模型重叠。
select_first_model: true


# eval_gt: bool, 标量
#   传入: run.py 的 `if eval_gt: gt = load_gt_from_structure(...)`
#   作用: 自动评估开关。若为 True，程序在推断后会即时从 .cif 提取配体并生成真实掩码图，用于在终端/Excel 打印精度指标。
eval_gt: true

# filter_preset: str, 标量
#   传入: parse_input.load_gt_from_structure() 调用 Make_Data/labels/filter_config.py 的映射对象
#   作用: 配体筛选预设规则。决定如何从 PDB 中筛选非蛋白质/核酸原子作为 GT 标签。
filter_preset: "five_class"      #NOTE

# class_mapping: list[int] | null
#   传入: parse_input.load_gt_from_structure(class_mapping=...) 的替换算子
#   作用: GT 标签类别映射表。用于聚合多类别或数值替换，将原始口袋标签映射为模型输出维度。
class_mapping: [0, 1, 0, 0, 1]   #NOTE

# dist_threshold: float, 标量 (Å)
#   传入: evaluator.semantic_evaluate(dist_threshold=...)
#   作用: 点云评估命中阈值。预测原子点与 GT 原子点距离在此范围内视为命中。
dist_threshold: 3.0

# error_dir: str | null
#   传入: run.py 调用 run_raw_pipeline(error_dir=...) 及解析库
#   作用: 错误日志记录目录。用于记录 RAW 读取推断失败的具体原因或记录失败的 PDB。
error_dir: "/home/penghongen/My_Project/feedback/infer_error/"


# --- 模型权重 ---
# ckpt_path: str, 标量
#   传入: run.py 传给 get_pred.load_model(ckpt_path=...)
#   作用: 模型权重路径。指定已训练网络参数（last.ckpt）的加载位置。
ckpt_path: "/home/penghongen/My_Project/feedback/logs/RAUNet-MyDatasets_half_1-none/half_1____2026-03-04_17-35-26/checkpoints/last.ckpt" #NOTE

# backbone_override: dict | null
#   传入: get_pred.load_model(backbone_override=...)
#   作用: 模型结构硬覆盖配置。当权重文件中缺失网络结构定义时，强制指定超参数构建模型。
backbone_override: null


# --- 计算设备 ---
# device: str, 标量
#   传入: run.py 传给各个模型和张量
#   作用: PyTorch 计算设备。指定运算所在的硬件（如 'cuda:0' 或 'cpu'）。
device: "cuda:0"


# --- 输出路径 ---
# output_root: str, 标量
#   传入: run.py _run_raw_param_search_mode() 的数据汇总环节
#   作用: 扫参结果输出根目录。存放 param_search_results.xlsx 及日志的地点。
output_root: "/home/penghongen/My_Project/feedback/infer_out/v0_half1_search_10" #NOTE

# npz_root_path: str, 标量
#   传入: run.py _run_raw_param_search_mode() 
#   作用: .npz 存放的根目录。在单纯只调后处理参数时，所有的推断结果或中间结果(体素pred,hardmask,atom_coords等)将以 .npz 未压缩格式储存在该路径内
npz_root_path: "/home/penghongen/My_Project/feedback/infer_out/npz_10"  #NOTE

# delete_cache: bool, 标量
#   传入: run.py _run_raw_param_search_mode() 
#   作用: 缓存清理开关。推断结束后是否删除本次产生的.npz
delete_cache: false




# --- 可视化配置 ---
# vis_enable: bool
#   传入: _build_vis_bundle_safe()
#   作用: 可视化总开关。是否生成 PyMOL 可读的可视化文件包。
vis_enable: true
# vis_output_root: str | null
#   传入: _build_vis_bundle_safe()
#   作用: 可视化输出路径。建议设置为 "${output_root}/vis"。未设置则跳过可视化。
vis_output_root: "/home/penghongen/My_Project/feedback/infer_out/v0_half1_vis_10/"   #NOTE
# vis_subdir: str | null
#   传入: _build_vis_bundle_safe()
#   作用: 可视化输出子目录。如果存在, 那么输出目录就变为 os.path.join(vis_output_root, vis_subdir) 而不是 vis_output_root
vis_subdir: "val100"                                                            #NOTE
# vis_after_search: bool
#   传入: run.py 在扫参结束后的处理逻辑
#   作用: 搜索后可视化开关。若开启，则在获得最优解后对样本进行最终可视化生成。
vis_after_search: true











# see me: 将会在这里增加高斯衰减核开关
# --- 推断推导基准参数 ---
# 以下参数作为“未被 sweep 清单”覆盖时的默认值

# batch_size: int, 标量
#   传入: get_pred.run_inference(batch_size=...) 模块
#   作用: 推断并行度。控制每次送入网络的滑窗块数量，平衡推理速度与显存占用。
batch_size: 5

# stride: int, 标量 (像素单位)
#   传入: get_pred.run_inference() -> map_segmentation(stride=...)
#   作用: 滑窗步幅。立方体滑动重叠的步长，越小重叠率越高，推理越准但越慢。
stride: 46

# windows_size: int, 标量 (像素单位)
#   传入: get_pred.run_inference() -> map_segmentation(windows_size=...)
#   作用: 滑窗物理尺寸。决定每一次前向传播的三维块体积大小（宽深高）。
windows_size: 72

# threshold: float, 标量
#   传入: postprocess.point_semantic_segment(threshold=...) 后处理
#   作用: 分割判决阈值。将预测概率转换为二值口袋判定线的基准值，大于此值判定为口袋。
threshold: 0.5

# point_assign_radius: float, 标量 (Å)
#   传入: assign_prob_to_atoms(radius=...)
#   作用: 原子赋分半径。体素概率向原子点云映射时的考察物理搜索半径。
point_assign_radius: 1.5

# point_assign_sigma: float, 标量 (Å)
#   传入: assign_prob_to_atoms(sigma=...)
#   作用: 高斯核标准差。控制为原子赋概率时的距离加权衰减强度。  <=0.0则退化到home
point_assign_sigma: 0.0

# point_cat_weight_home: float, 标量
#   传入: assign_prob_to_atoms(cat_weight_home=...)
#   作用: 所在体素类别权重。原子所在主要体素对其概率的贡献占比。
point_cat_weight_home: 10.0

# point_cat_weight_has_atom: float, 标量
#   传入: assign_prob_to_atoms(cat_weight_has_atom=...)
#   作用: 含原子体素类别权重。原子周围含有原子的体素对其概率的贡献占比。
point_cat_weight_has_atom: 5.0

# point_cat_weight_no_atom: float, 标量
#   传入: assign_prob_to_atoms(cat_weight_no_atom=...)
#   作用: 不含原子体素类别权重。原子周围不含原子的空白体素对其概率的负向或调节占比。
point_cat_weight_no_atom: 1.0

# core_offset: int, 标量 (像素单位)
#   传入: get_pred.run_inference() -> map_reconstruction(core_offset=...) 
#   作用: 重叠边缘舍弃宽度。丢弃每个 Block 边缘的体素以规避滑窗拼接时的边界预测不准问题，提升精度。
core_offset: 12

# excel_sample_n: int, 标量
#   传入: run.py 汇总结果至 Excel 的逻辑
#   作用: 样本细节展示数量。在 param_search_results.xlsx 中抽取多少个样本展示分数明细。0则不记录。
excel_sample_n: 10

# --- 网格调参配置 (核心扫参节) ---
# param_sweep: list[dict]
#   传入: run.py _run_raw_param_search_mode() -> generate_param_grid()
#   作用: 扫参定义列表。定义要在哪些参数上、按何种 [min, max, step] 范围内进行笛卡尔积遍历测试。
#         若仅扫 threshold，代码会自动开启概率图缓存以极速完成搜索。
param_sweep:
  - name: threshold
    min: 0.30
    max: 0.50
    step: 0.01
