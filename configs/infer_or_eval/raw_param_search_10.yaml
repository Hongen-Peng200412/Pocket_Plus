# =============================================================================
# 基于原始文件结构的网格调参搜寻配置 (点云推断版)
# =============================================================================
# 此文件供 src/inference/run.py 使用，通过 Hydra 加载:
#   python src/inference/run.py --config=raw_param_search_10 ckpt_path="..."
#
# 该模式:
#   1. 对每个 (CIF, MAP) 样本执行一次完整点云推断, 缓存逐 BOX logits (.npz)
#   2. 对后处理参数 (threshold / core_decay_mode / core_offset 等) 做笛卡尔积搜索
#   3. 以 avg_F1 为导向寻找最佳后处理参数, 汇总到 param_search_results.xlsx
# =============================================================================


# --- 运行模式 ---
# mode: str, 标量
#   传入: run.py main() 分流执行 _run_raw_param_search_mode()
#   作用: 运行模式。指定代码执行基于原始文件（CIF/MAP）的网格调参搜寻逻辑 (点云推断版)。
mode: "raw_param_search"


# --- 输入数据 ---
# raw_pairs_json: str, JSON 路径
#   传入: run.py _run_raw_param_search_mode() -> load_raw_pairs(raw_pairs_json)
#   作用: 输入数据名单。JSON 中每项包含 {"cif_path": ..., "map_path": ...[, "cif_gt_path": ...]}。
#         可通过 src/inference/utils/yield_json_from_raw_sample.py 生成。
raw_pairs_json: "/home/penghongen/My_Project/Pocket/src/inference/utils/for_v0_search.json"


# --- 动态数据处理特征 ---
# target_voxel_size: float, 标量 (Å)
#   传入: run.py _run_raw_param_search_mode() -> run_raw_point_pipeline(target_voxel_size=...) -> load_from_raw_cif() -> make_model_grid()
#   作用: 实时重采样目标体素大小。决定生成网格的物理分辨率尺寸。
target_voxel_size: 1.0

# compute_density: bool, 标量
#   传入: run.py _run_raw_param_search_mode() -> run_raw_point_pipeline(compute_density=...)
#   作用: 原子局部密度特征计算开关。是否将 PDB 局部密度作为额外特征通道加入。
compute_density: true

# select_first_model: bool, 标量
#   传入: run.py _run_raw_param_search_mode() -> run_raw_point_pipeline(select_first_model=...)
#   作用: 单模型筛选开关。避免包含多晶体结构的 PDB 在特征空间内叠加冲突。多模型 CIF 时是否仅取第一个。
select_first_model: true


# --- GT 标签提取与评估参数 ---
# eval_gt: bool, 标量
#   传入: run.py _run_raw_param_search_mode()
#   作用: 实时伴随评估。开启后将在调参时对 GT 标签进行即时评估计算（调参必须为 true 才能搜索最高指标）。
eval_gt: true

# filter_preset: str, 标量
#   传入: run.py _run_raw_param_search_mode() -> load_gt_from_structure(filter_preset=...)
#   作用: 配体筛选预设规则。决定如何从 PDB 中筛选非蛋白质/核酸原子作为 GT 标签。
filter_preset: "five_class"                                                    #NOTE

# class_mapping: list[int] | null
#   传入: run.py _run_raw_param_search_mode() -> load_gt_from_structure(class_mapping=...)
#   作用: GT 标签类别映射表。用于聚合并替换多类别标签为模型预测对应的维度。
class_mapping: [0, 1, 0, 0, 1]                                                #NOTE

# dist_threshold: float, 标量 (Å)
#   传入: run.py _run_raw_param_search_mode() -> semantic_evaluate(dist_threshold=...)
#   作用: 点云评估命中距离阈值。预测原子点与 GT 原子点距离在此范围内视为命中。
dist_threshold: 3.0

# error_dir: str | null
#   传入: run.py _run_raw_param_search_mode() -> run_raw_point_pipeline(error_dir=...)
#   作用: 错误日志记录目录。用于记录读取推断失败的具体原因或失败的 PDB 列表。
error_dir: "/home/penghongen/My_Project/feedback/infer_error/"


# --- 模型权重 ---
# ckpt_path: str, 标量
#   传入: run.py main() 解析并传给 get_pred.load_model(ckpt_path=...)
#   作用: 模型权重路径。指定已训练网络参数（last.ckpt）的加载位置。
ckpt_path: "/home/penghongen/My_Project/feedback/logs/RAUNet-MyDatasets_half_1-none/half_1____2026-03-04_17-35-26/checkpoints/last.ckpt"   #NOTE

# backbone_override: dict | null
#   传入: run.py main() 解析并传给 get_pred.load_model(backbone_override=...)
#   作用: 模型结构硬覆盖配置。当权重文件中缺失网络结构定义时，强制指定超参数结构配置。
backbone_override: null


# --- 计算设备 ---
# device: str, 标量
#   传入: run.py main() 解析并传给推断函数
#   作用: PyTorch 计算设备。指定运算所在的硬件（如 'cuda:0' 或 'cpu'）。
device: "cuda:0"


# --- 输出路径 ---
# output_root: str, 标量
#   传入: run.py main() 解析并传给对应模式的函数
#   作用: 扫参结果输出根目录。存放 param_search_results.xlsx 及日志的地点。
output_root: "/home/penghongen/My_Project/feedback/infer_out/v0_half1_search_10"   #NOTE


# --- 缓存控制 ---
# delete_cache_after_search: bool, 标量
#   传入: run.py _run_raw_param_search_mode() 第 4 步清理逻辑
#   作用: 搜索完毕后是否删除 _logits_cache 目录下的中间 `.npz` 临时缓存文件。
delete_cache_after_search: false


# --- 可视化配置 ---
# vis_enable: bool, 标量
#   传入: _build_vis_bundle_safe() 用于获取开关 
#   作用: 可视化总开关。是否生成 PyMOL 可读的可视化文件包 (网格调参无单独可视化环节时此参数可不生效或用于复盘)。
vis_enable: true

# vis_output_root: str | null
#   传入: _build_vis_bundle_safe()
#   作用: 可视化输出路径。建议设置为 "${output_root}/vis"。未设置则跳过可视化。
vis_output_root: "/home/penghongen/My_Project/feedback/infer_out/v0_half1_vis_10/"   #NOTE

# vis_subdir: str | null
#   传入: _build_vis_bundle_safe()
#   作用: 可视化输出子目录。如果存在, 那么输出目录就变为 os.path.join(vis_output_root, vis_subdir)。
vis_subdir: "val100"                                                                  #NOTE


# --- 推断基准参数 ---
# batch_size: int, 标量
#   传入: run.py _run_raw_param_search_mode() -> run_raw_point_pipeline(batch_size=...)
#   作用: 每个推断 batch 包含的 BOX 数。控制每次送入网络的滑窗块数量，平衡推理速度与显存占用。
batch_size: 5

# stride: int, 标量 (voxel)
#   传入: run.py _run_raw_param_search_mode() -> run_raw_point_pipeline(stride=...)
#   作用: 滑窗步幅。立方体滑动重叠的步长。
stride: 46

# windows_size: int, 标量 (voxel)
#   传入: run.py _run_raw_param_search_mode() -> run_raw_point_pipeline(windows_size=...)
#   作用: 滑窗物理尺寸。决定每一次前向传播的三维块体积大小（宽深高）。
windows_size: 72

# threshold: float, 标量
#   传入: _run_raw_param_search_mode() 进行初次概率提取以及调参默认值
#   作用: 语义分割二值化阈值。在未被 search_params 涵盖的情况下，控制提取掩码的切割线。
threshold: 0.5


# --- 点云推断聚合参数 ---
# 聚合策略: 固定使用加权平均 logit → sigmoid → prob (logit_mean)

# core_decay_mode: str, 标量
#   传入: run.py _run_raw_param_search_mode() -> run_raw_point_pipeline(core_decay_mode=...)
#   作用: 核心区无衰减向 BOX 边传递信度的衰减方式。"hard" / "linear" / "none"。
core_decay_mode: "linear"

# core_offset: int, 标量 (voxel)
#   传入: run.py _run_raw_param_search_mode() -> run_raw_point_pipeline(core_offset=...)
#   作用: 裁边厚度。丢弃或衰减每个 Block 边缘的体素信度以规避滑窗拼接时的边界预测不准问题。
core_offset: 2

# atom_buffer_radius: float, 标量 (Å)
#   传入: run.py _run_raw_param_search_mode() -> run_raw_point_pipeline(atom_buffer_radius=...)
#   作用: 原子缓冲半径。当前 raw 调参默认保留 4.0A 上下文，这与当前训练主配置的 0.0 不同。
atom_buffer_radius: 4.0

# valid_crop_margin: int, 标量 (voxel)
#   传入: run.py _run_raw_param_search_mode() -> run_raw_point_pipeline(valid_crop_margin=...)
#   作用: 监督区域裁边量。点云推理在切分盒子时跳过边缘监督裁剪逻辑对应的偏置参数。
valid_crop_margin: 0

# box_spatial_weight_sigma_ratio: float, 标量
#   传入: run.py _run_raw_param_search_mode() -> run_raw_point_pipeline(box_spatial_weight_sigma_ratio=...)
#   作用: 高斯核 sigma 衰减率。高斯核 sigma = sigma_ratio × BOX 中心到角点的距离。用于融合时给距离中心较远的 logit 进行降权处理。
box_spatial_weight_sigma_ratio: 0.5


# --- 网格调参配置 ---
# search_params: dict
#   传入: run.py _run_raw_param_search_mode() -> generate_param_grid(search_params)
#   作用: 每个键为参数名, 值为 [min, max, step]。会根据对应字典对所有参数做笛卡尔积。
#   可搜索的参数: threshold, core_offset, core_decay_mode, dist_threshold
search_params:
  threshold:
    min: 0.30
    max: 0.50
    step: 0.01
  # core_offset:
  #   min: 0
  #   max: 4
  #   step: 1
  # core_decay_mode: ["hard", "linear", "none"]


# --- Hydra 行为控制 ---
hydra:
  job:
    chdir: false

