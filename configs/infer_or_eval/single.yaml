# =============================================================================
# 处理好数据的单样本推断配置 (Single Sample Inference Configuration)
# =============================================================================
# 此文件供 src/inference/run.py 使用，通过 Hydra 加载:
#   python src/inference/run.py --config-name=single +ckpt_path="..."
# =============================================================================

# --- 运行模式 ---
# mode: str, 标量
#   传入: run.py main() 分流执行 _run_single_mode() 单元
#   作用: 运行模式。指定代码对预处理好的特定单个 .npz 样本进行推断。
mode: "single"


# --- 数据路径 ---
# all_data_path: str, 标量
#   传入: run.py _run_single_mode() 传至 parse_input.load_from_npz_dirs()
#   作用: 预处理文件夹总库。在此基准目录下寻找具体类别的具体样本。
all_data_path: "/storage/penghongen/Pocket_classic/v_0"

# data_folder_names: list[str]
#   传入: parse_input.load_from_npz_dirs(data_folder_names=...)
#   作用: 数据依赖目录。按此列表载入对应的密度、特征与标签组件进行合并。
data_folder_names: ["emdb_BOX", "pdb_feature_BOX", "pdb_label_BOX"]

# class_mapping: list[int] | null
#   传入: parse_input.load_from_npz_dirs(class_mapping=...)
#   作用: 类别聚合规则。将原始标签的类别按索引映射为新值。
class_mapping: [0, 1, 1, 1, 1]

# class_folder: str, 标量
#   传入: parse_input.load_from_npz_dirs(class_folder=...)
#   作用: 样本所属分类。对应数据集下的二级子路径名称。
class_folder: "small_molecule"

# sample_name: str, 标量
#   传入: parse_input.load_from_npz_dirs(sample_name=...)
#   作用: 样本标识符。指定待加载的特定 .npz 数据文件名（不含后缀）。
sample_name: "9f3f_0_0_0_0_C"


# --- 模型权重 ---
# ckpt_path: str, 标量
#   传入: get_pred.load_model(ckpt_path=...)
#   作用: 权重加载地。读取神经网络参数、初始化架构。
ckpt_path: "/home/penghongen/My_Project/feedback/logs/RAUNet-MyDatasets_half_1-none/half_1____2026-03-04_17-35-26/checkpoints/last.ckpt"

# backbone_override: dict | null
#   传入: get_pred.load_model(backbone_override=...)
#   作用: 配置强行纠偏。由用户手动指定网络搭建参数。
backbone_override: null


# --- 计算设备 ---
# device: str, 标量
#   传入: 送入 model.to(device) 及 tensor 处理流
#   作用: 算力调度。选择硬件后端（GPU/CPU）。
device: "cuda:0"


# --- 输出路径 ---
# output_root: str, 标量
#   传入: run.py 结果保存子例程
#   作用: 结果文件夹。预测的概率/硬预测将存放在该根目录下的样本专属子文件夹内。
output_root: "inference_output"


# --- 滑窗推断参数 ---
# batch_size: int, 标量
#   传入: get_pred.run_inference(batch_size=...)
#   作用: 推断并行负载。调节每次前向传播的 3D 数据块数量，防止显存溢出。
batch_size: 1

# stride: int, 标量 (像素单位)
#   传入: get_pred.run_inference() 核心
#   作用: 步幅间隔。控制体素质心每次滑动的距离。
stride: 32

# windows_size: int, 标量 (像素单位)
#   传入: get_pred.run_inference() 核心
#   作用: 采样窗心规格。指定进入 U-Net 的立方体三维物理宽度。
windows_size: 48

# core_offset: int, 标量 (像素单位)
#   传入: get_pred.run_inference() 的 map_reconstruction 部件
#   作用: 边界不信任区。抛弃滑窗最边缘的部分，仅保留中心高质量核心去预测整体口袋。
core_offset: 2


# --- 后处理参数 ---
# threshold: float, 标量
#   传入: postprocess.semantic_segment(threshold=...)
#   作用: 分割概率闸门。大于此值的连续预测概率最终判定为物理口袋（Label 1）。
threshold: 0.5


# --- Hydra 行为控制 ---
hydra:
  job:
    chdir: false
