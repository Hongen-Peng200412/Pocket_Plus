# =============================================================================
# 基于原始文件结构的单样本推断配置 (Raw Structure Single Inference Configuration)
# =============================================================================
# 此文件供 src/inference/run.py 使用，通过 Hydra 加载:
#   python src/inference/run.py --config=raw_single \
#       "+cif_path=/path/to/xxx.cif" "+map_path=/path/to/emd_xxx.map" \
#       "ckpt_path=..."
# 此文件的所有配置项以 cfg.* 的形式被 run.py main() → _run_raw_single_mode() 消费
# =============================================================================

# --- 运行模式 ---
# mode: str, 标量
#   → run.py main(): 按此字段分流到 _run_raw_single_mode()
#   作用: 指定代码执行针对原始文件的、不依赖 BOX 预处理的即时处理流。
mode: "raw_single"


# --- 原始数据核心路径 (必须覆盖) ---
# cif_path: str, 标量
#   → run.py _run_raw_single_mode() → run_raw_point_pipeline() → load_from_raw_cif()
#   作用: 结构数据文件。读取蛋白原子坐标与残基三元组信息。
# cif_path: null

# map_path: str, 标量
#   → run.py _run_raw_single_mode() → run_raw_point_pipeline() → load_from_raw_cif()
#   作用: 密度图矩阵文件（EMDB）。提供三维电子云分布。
# map_path: null

# cif_gt_path: str | null
#   → run.py _run_raw_single_mode() → run_raw_point_pipeline(cif_gt_path=...)
#   作用: 真实结构参考。用于场景B：建模结构做输入提特征，实验解析结构做真值对齐评估。
#         若为 null 则回退到 cif_path（场景A：模型输入特征和 GT 标签均来自同一 .cif）。
# cif_gt_path: null


# --- 模型权重 ---
# ckpt_path: str, 标量
#   → run.py main() → get_pred.load_model(ckpt_path=...)
#   作用: 权重加载位置。Lightning checkpoint (.ckpt) 路径。
ckpt_path: null

# backbone_override: dict | null
#   → run.py main() → get_pred.load_model(backbone_override=...)
#   作用: 模型结构硬编码覆盖配置。通常不需要，自动从 ckpt 中的 hyper_parameters 读取。
backbone_override: null


# --- 计算设备 ---
# device: str, 标量
#   → run.py main(): torch.device(device)
#   作用: 运算设备选择（CUDA 优先，如 "cuda:0"）。
device: "cuda:0"


# --- 输出路径 ---
# output_root: str, 标量
#   → run.py _run_raw_single_mode(output_root=...)
#   作用: 持久化文件落点。保存在 {output_root}/{sample_name}/ 之下。
output_root: "inference_output/raw"


# --- 动态数据处理特征 ---
# target_voxel_size: float, 标量 (Å)
#   → run.py _run_raw_single_mode() → run_raw_point_pipeline() → load_from_raw_cif()
#   作用: 归一化体素重采样大小。定义电镜密度采样至网络时物理间距。绝不可瞎填。
target_voxel_size: 1.0

# compute_density: bool, 标量
#   → run.py _run_raw_single_mode() → run_raw_point_pipeline() → load_from_raw_cif()
#   作用: 密度通道路由。是否计算原子的局部堆叠密度作为额外特征。
compute_density: true

# select_first_model: bool, 标量
#   → run.py _run_raw_single_mode() → run_raw_point_pipeline() → load_from_raw_cif()
#   作用: 单模型筛选开关。避免包含多结构的 PDB 在特征空间内叠加冲突。
select_first_model: false


# --- GT 标签提取与评估参数 ---
# eval_gt: bool, 标量
#   → run.py _run_raw_single_mode() → run_raw_point_pipeline(eval_gt=...)
#   作用: 实时伴随评估。开启后将立刻从输入结构自带配体中算出口袋精度。
eval_gt: false

# filter_preset: str, 标量
#   → run.py _run_raw_single_mode() → run_raw_point_pipeline(filter_preset=...)
#   → load_gt_from_structure(filter_preset=...)
#   作用: 配体原子过滤模板选择。决定提取 GT 标签时的筛选规则。
filter_preset: "five_class"

# dist_threshold: float, 标量 (Å)
#   → run.py _run_raw_single_mode() → run_raw_point_pipeline(dist_threshold=...)
#   → semantic_evaluate(dist_threshold=...)
#   作用: 原子评估(Hit)判定半径。预测点与 GT 原子在该距离内判定成功检测。
dist_threshold: 3.0

# error_dir: str | null
#   → run.py _run_raw_single_mode() → run_raw_point_pipeline(error_dir=...)
#   作用: 异常导出位置。遇到不可读结构或异常时的报错写入地点。null 时不写出。
error_dir: null

# --- 以下参数已自动从训练 config.yaml 的 dataset.* 中读取 ---
# 推理时 _get_cfg() 优先读推理 YAML, 不存在则回退到训练 dataset 配置。
# 如需在推理时覆盖训练值, 可取消注释并显式设置:
# class_mapping: [0, 1, 1, 1, 1]
# atom_buffer_radius: 4.0
# valid_crop_margin: 0
# emdb_z_score: 1


# --- 模型执行参数 ---
# batch_size: int, 标量
#   → run.py _run_raw_single_mode() → run_raw_point_pipeline(batch_size=...)
#   → prepare_batched_boxes()
#   作用: 每个推断 batch 包含切分 BOX 数目，控制 GPU VRAM 的吞吐量。
batch_size: 1

# stride: int, 标量 (voxel)
#   → run.py _run_raw_single_mode() → run_raw_point_pipeline(stride=...)
#   → split_volume_to_boxes(stride=...)
#   作用: 窗口滑步长度。越小重叠率越高、覆盖越密，但推断量也越大。
stride: 32

# windows_size: int, 标量 (voxel)
#   → run.py _run_raw_single_mode() → run_raw_point_pipeline(windows_size=...)
#   → split_volume_to_boxes(window_size=...)
#   作用: 滑窗物理边长，决断每一次输入网络的张量跨度。须与训练 BOX 大小对齐。
windows_size: 48

# threshold: float, 标量
#   → run.py _run_raw_single_mode() → run_raw_point_pipeline(threshold=...)
#   → point_semantic_segment(threshold=...)
#   作用: 语义分割阳性概率的二值化判定阈值。
threshold: 0.5


# --- 点云推断聚合参数 ---
# core_decay_mode: str, 标量
#   → run.py _run_raw_single_mode() → run_raw_point_pipeline(core_decay_mode=...)
#   → merge_box_atom_results(core_decay_mode=...)
#   作用: 核心区信度衰减方式。"hard" (边界内1，界外0) / "linear" (向外线性衰减) / "none" (不衰减)。
core_decay_mode: "linear"

# core_offset: int, 标量 (voxel)
#   → run.py _run_raw_single_mode() → run_raw_point_pipeline(core_offset=...)
#   → merge_box_atom_results(core_offset=...)
#   作用: 裁边厚度。将各个 BOX 边缘部分认定为不稳定，并在聚合时减权或裁边。
core_offset: 2

# box_spatial_weight_sigma_ratio: float, 标量
#   → run.py _run_raw_single_mode() → run_raw_point_pipeline(box_spatial_weight_sigma_ratio=...)
#   → merge_box_atom_results(box_spatial_weight_sigma_ratio=...)
#   作用: 空间权重高斯核 sigma = sigma_ratio × 密度图最大半径。
#         1.0 表示权重衰减很缓, 0.3 表示快速衰减。用于多角度重叠原子的归一化信任分布修正。
box_spatial_weight_sigma_ratio: 0.5

# merge_mode: str, 标量
#   → run.py _run_raw_single_mode() → run_raw_point_pipeline(merge_mode=...)
#   → merge_box_atom_results(merge_mode=...)
#   作用: 多 BOX 原子预测聚合策略。默认 "logit_mean" 先加权平均 logit 再做 sigmoid;
#         "prob_mean" 表示先把每个 BOX 的 logit 转为 prob, 再加权平均 prob。
merge_mode: "logit_mean"

# semantic_segment_method: str, 标量
#   → run.py _run_raw_single_mode() → run_raw_point_pipeline(semantic_segment_method=...)
#   → point_semantic_segment(semantic_segment_method=...)
#   作用: 原子概率 → 语义分割的总入口。"threshold" 表示仅做阈值二值化;
#         "dbscan" 表示在阈值后再用 DBSCAN 去除孤立点。
semantic_segment_method: "threshold"

# dbscan_eps: float, 标量 (Å)
#   → point_semantic_segment(dbscan_eps=...)
#   作用: DBSCAN 半径参数 eps。仅在 semantic_segment_method="dbscan" 时生效。
dbscan_eps: 2.0

# dbscan_min_samples: int, 标量
#   → point_semantic_segment(dbscan_min_samples=...)
#   作用: DBSCAN 的核心点最少邻居数。仅在 semantic_segment_method="dbscan" 时生效。
dbscan_min_samples: 3


# --- 可视化配置 ---
# vis_enable: bool, 标量
#   → run.py _run_raw_single_mode() → _build_vis_bundle_safe(cfg_dict)
#   作用: 可视化总开关。控制是否最终产出 PyMol session 和脚本。
vis_enable: true

# vis_output_root: str | null
#   → _build_vis_bundle_safe(cfg_dict): 可视化输出根目录
#   作用: 可视化专属的落点路径，不填(null)则跳过显示生成并报未设置。
vis_output_root: null

# vis_subdir: str | null
#   → _build_vis_bundle_safe(cfg_dict): 可视化子目录
#   作用: 非 null 时输出到 {vis_output_root}/{vis_subdir}/{pdb_id}/ 之下。
# vis_subdir: null


# --- Hydra 行为控制 ---
hydra:
  job:
    chdir: false
