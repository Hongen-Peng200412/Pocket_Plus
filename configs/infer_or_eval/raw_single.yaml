# =============================================================================
# 基于原始文件结构的单样本推断配置 (Raw Structure Single Inference Configuration)
# =============================================================================
# 此文件供 src/inference/run.py 使用，通过 Hydra 加载:
#   python src/inference/run.py --config-name=raw_single \
#       +cif_path="/path/to/xxx.cif" +map_path="/path/to/emd_xxx.map" \
#       +ckpt_path="..."
# =============================================================================

# --- 运行模式 ---
# mode: str, 标量
#   传入: run.py main() 分流执行 _run_raw_mode() 
#   作用: 运行模式。指定代码执行针对原始文件的、不依赖 BOX 预处理的即时处理流。
mode: "raw_single"


# --- 原始数据核心路径 (必须覆盖) ---
# cif_path: str, 标量
#   传入: run_raw_pipeline() -> load_from_raw_cif()
#   作用: 结构数据文件。读取蛋白原子坐标与残基三元组信息。
# cif_path: null

# map_path: str, 标量
#   传入: load_map() -> make_model_grid()
#   作用: 密度图矩阵文件（EMDB）。提供三维电子云分布。
# map_path: null

# cif_gt_path: str | null
#   传入: run_raw_pipeline(cif_gt_path=...)
#   作用: 真实结构参考。用于场景B：建模结构做输入提特征，实验解析结构做真值对齐评估。
# cif_gt_path: null


# --- 动态数据处理特征 ---
# target_voxel_size: float, 标量 (Å)
#   传入: make_model_grid(target_voxel_size=...)
#   作用: 归一化体素重采样大小。定义电镜密度采样至网络时物理间距。绝不可瞎填。
target_voxel_size: 1.0

# compute_density: bool, 标量
#   传入: get_features_when_infer(compute_density=...)
#   作用: 密度通道路由。是否计算原子的局部堆叠密度作为额外特征。
compute_density: true

# select_first_model: bool, 标量
#   传入: get_features_when_infer(select_first_model=...) 
#   作用: 单模型筛选开关。避免包含多结构的 PDB 在特征空间内叠加冲突。
select_first_model: false


# --- GT 标签提取与评估参数 ---
# eval_gt: bool, 标量
#   传入: run.py 接收，激发 load_gt_from_structure()
#   作用: 实时伴随评估。开启后将立刻从输入结构自带配体中算出口袋精度。
eval_gt: false

# filter_preset: str, 标量
#   作用: 配体原子过滤模板选择。
filter_preset: "binary"

# class_mapping: list[int] | null
#   作用: 口袋标签 ID 映射纠偏列表。
class_mapping: [0, 1, 1, 1, 1]

# dist_threshold: float, 标量 (Å)
#   作用: 原子评估(Hit)判定半径。
dist_threshold: 3.0

# error_dir: str | null
#   作用: 遇到不可读结构时的异常导出位置。
error_dir: null


# --- 模型权重 ---
# ckpt_path: str, 标量
#   作用: 权重加载路径。
ckpt_path: "/home/penghongen/My_Project/feedback/logs/RAUNet-MyDatasets_half_1-none/half_1____2026-03-04_17-35-26/checkpoints/last.ckpt"

# backbone_override: dict | null
#   作用: 模型结构覆盖。
backbone_override: null


# --- 计算设备 ---
# device: str, 标量
#   作用: 运算设备选择（CUDA优先）。
device: "cuda:0"


# --- 输出路径 ---
# output_root: str, 标量
#   传入: run.py 最终结果拼接逻辑
#   作用: 持久化文件落点。保存在 `output_root / sample_name /` 之下。
output_root: "inference_output/raw"


# --- 可视化配置 ---
# vis_enable: bool
vis_enable: true
# vis_output_root: str | null
vis_output_root: null


# --- 模型执行参数 ---
# batch_size: int, 标量
batch_size: 1
# stride: int, 标量 (像素)
stride: 32
# windows_size: int, 标量 (像素)
windows_size: 48
# core_offset: int, 标量 (像素)
core_offset: 2
# threshold: float, 标量
threshold: 0.5

# point_assign_* 系列: float, 标量 (Å)
#   传入: assign_prob_to_atoms() 后处理流
#   作用: 细节权重。确定三维网格概率落点在原子质心层级时的加权平均权重配置。
point_assign_radius: 2.0
point_assign_sigma: 1.0
point_cat_weight_home: 0.5
point_cat_weight_has_atom: 0.35
point_cat_weight_no_atom: 0.15


# --- Hydra 行为控制 ---
hydra:
  job:
    chdir: false
