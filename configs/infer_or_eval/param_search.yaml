# =============================================================================
# 处理好数据的网格调参搜寻配置 (Grid Parameter Search Configuration)
# =============================================================================
# 此文件供 src/inference/run.py 使用，通过 Hydra 加载:
#   python src/inference/run.py --config-name=param_search +ckpt_path="..."
#
# 该模式专门用于在处理好的验证集(val.json)上，枚举给定的所有超参笛卡尔积（例如 threshold, core_offset）
# 以最优化的 avg_F1 (或自定指标) 为导向寻找最佳后处理参数，汇总到 param_search_results.xlsx。
# =============================================================================

# --- 运行模式 ---
# mode: str, 标量
#   传入: run.py main() 分流执行 _run_param_search_mode()
#   作用: 运行模式。指定代码执行针对预处理 BOX 数据（NPZ格式）的网格搜索调参逻辑。
mode: "param_search"


# --- 数据路径 ---
# all_data_path: str, 标量
#   传入: parse_input.prepare_data_entries() 和 parse_input.load_from_npz_dirs()
#   作用: 预处理数据集根目录。定位处理好的 BOX .npz 文件的基准路径。
all_data_path: "/storage/penghongen/Pocket_classic/v_0"

# data_folder_names: list[str]
#   传入: 同 batch / single 模式，由 run.py 传递给解析模块
#   作用: 数据组件清单。定义样本特征来源（如 emdb_BOX, pdb_feature_BOX）及标签来源。
data_folder_names: ["emdb_BOX", "pdb_feature_BOX", "pdb_label_BOX"]

# class_folder_names: list[str]
#   传入: parse_input.prepare_data_entries(class_folder_names=...)
#   作用: 目标类别列表。在批量扫描样本时需要检索的类型子目录名称。
class_folder_names: ["small_molecule", "metal_ion", "peptide", "nucleic"]

# class_mapping: list[int] | null
#   传入: parse_input.load_from_npz_dirs(class_mapping=...)
#   作用: 类别聚合映射表。规定原始标签 ID 转换至模型预测维度的索引映射，对评估正确率至关重要。
class_mapping: [0, 1, 1, 1, 1]


# --- 验证集名单 ---
# split_files: list[str] | null
#   传入: parse_input.prepare_data_entries(split_files=...)
#   作用: 样本白名单 JSON。指定此次扫参所读取的具体样本集合（通常为 val 验证集，避免过拟合 test 集）。
split_files: [
  "/storage/penghongen/Pocket_classic/v_0/split/split_0/small_molecule/val.json",
  "/storage/penghongen/Pocket_classic/v_0/split/split_0/metal_ion/val.json",
  "/storage/penghongen/Pocket_classic/v_0/split/split_0/peptide/val.json",
  "/storage/penghongen/Pocket_classic/v_0/split/split_0/nucleic/val.json"
]


# --- 模型权重 ---
# ckpt_path: str, 标量
#   传入: get_pred.load_model(ckpt_path=...)
#   作用: 模型权重路径。加载已训练好的 Lightning 权重（.ckpt）文件。
ckpt_path: "/home/penghongen/My_Project/feedback/logs/RAUNet-MyDatasets_half_1-none/half_1____2026-03-04_17-35-26/checkpoints/last.ckpt"

# backbone_override: dict | null
#   传入: get_pred.load_model(backbone_override=...)
#   作用: 模型配置硬覆盖。强制指定网络结构参数，忽略或补齐权重文件中缺失的架构定义。
backbone_override: null


# --- 计算设备 ---
# device: str, 标量
#   传入: run.py 传给各个模型和张量
#   作用: PyTorch 计算设备。控制运算发生在 GPU（如 'cuda:0'）还是 CPU。
device: "cuda:0"


# --- 输出路径 ---
# output_root: str, 标量
#   传入: run.py _run_param_search_mode() 的数据汇总环节
#   作用: 调参结果保存地。生成 param_search_results.xlsx 以供后续分析选择最优参数。
output_root: "inference_output/param_search"


# --- 推断推导基准参数 ---
# 以下参数作为“未被 sweep 清单”覆盖时的默认游标基准值

# batch_size: int, 标量
#   传入: get_pred.run_inference(batch_size=...)
#   作用: 推理并行度。每次送入网络的滑窗块数量，受显存限制。
batch_size: 2

# stride: int, 标量 (像素单位)
#   传入: get_pred.run_inference() -> map_segmentation(stride=...)
#   作用: 重叠滑动步幅。控制立方体滑动密度，影响预测平滑度及耗时。
stride: 48

# windows_size: int, 标量 (像素单位)
#   传入: get_pred.run_inference() -> map_segmentation(windows_size=...)
#   作用: 滑窗物理尺寸。定义输入模型的前向传播三维块边长。
windows_size: 48

# threshold: float, 标量
#   传入: postprocess.semantic_segment(threshold=...)
#   作用: 语义分割阈值。将模型输出概率截断为二值预测口袋的判定线。
threshold: 0.5

# core_offset: int, 标量 (像素单位)
#   传入: get_pred.run_inference() -> map_reconstruction(core_offset=...)
#   作用: 边缘废料带厚度。舍弃每个块的边界体素，仅使用中心核心区重建预测图，解决拼接伪影。
core_offset: 2


# --- 网格调参配置 (核心 Sweep 功能) ---
# param_sweep: list[dict]
#   传入: run.py 传给 generate_param_grid() 生成笛卡尔积组合
#   作用: 搜索空间定义。指定要在哪些参数上、按何种步长寻找全局最优精度点。
#         若仅扫 threshold，系统通过概率图缓存机制实现极速搜索。
param_sweep:
  - name: threshold
    min: 0.15
    max: 0.60
    step: 0.05
  # - name: core_offset
  #   min: 2
  #   max: 4
  #   step: 1


# --- Hydra 行为控制 ---
hydra:
  job:
    chdir: false
