# =============================================================================
# 基于原始文件结构的网格调参搜寻配置 (点云推断版)
# =============================================================================
# 此文件供 src/inference/run.py 使用，通过 Hydra 加载:
#   python src/inference/run.py --config=raw_param_search "ckpt_path=..."
#
# 此文件的所有配置项以 cfg.* 的形式被 run.py main() → _run_raw_param_search_mode() 消费
#
# 该模式:
#   1. 对每个 (CIF, MAP) 样本执行一次完整点云推断, 缓存逐 BOX logits (.npz)
#   2. 对后处理参数 (threshold / core_decay_mode / core_offset 等) 做笛卡尔积搜索
#   3. 以 avg_F1 为导向寻找最佳后处理参数, 汇总到 param_search_results.xlsx
#   4. 在最优参数下生成可视化 (若开启)
# =============================================================================


# --- 运行模式 ---
# mode: str, 标量
#   → run.py main(): 按此字段分流到 _run_raw_param_search_mode()
#   作用: 指定代码执行基于原始文件（CIF/MAP）的网格调参搜寻逻辑 (点云推断版)。
mode: "raw_param_search"


# --- 输入数据 ---
# raw_pairs_json: str, JSON 路径
#   → run.py _run_raw_param_search_mode(): cfg_dict.get("raw_pairs_json")
#   → load_raw_pairs(raw_pairs_json) 解析名单三元组 (cif_path, map_path, cif_gt_path)
#   作用: 输入数据名单。JSON 中每项包含 {"cif_path": ..., "map_path": ...[, "cif_gt_path": ...]}。
#         可通过 src/inference/utils/yield_json_from_raw_sample.py 生成。
raw_pairs_json: "/home/penghongen/My_Project/Pocket_Plus/src/inference/utils/for_v1_protein_eval.json"


# --- 模型权重 ---
# ckpt_path: str, 标量
#   → run.py main() → get_pred.load_model(ckpt_path=...)
#   → 同时自动推导 ckpt_slug (用于缓存子目录命名, 形如 "祖父目录名_____ckpt文件stem")
#   作用: 模型权重路径。指定已训练网络参数（.ckpt）的加载位置。
ckpt_path: "/home/penghongen/My_Project/feedback_plus/logs/stardard/标准2____job231587/checkpoints/TOP_epoch_08_score_0.8574.ckpt"

# backbone_override: dict | null
#   → run.py main() → get_pred.load_model(backbone_override=...)
#   作用: 模型结构硬覆盖配置。当权重文件中缺失网络结构定义时，强制指定超参数结构配置。
backbone_override: null


# --- 计算设备 ---
# device: str, 标量
#   → run.py main(): torch.device(device)
#   作用: PyTorch 计算设备。指定运算所在的硬件（如 "cuda:0" 或 "cpu"）。
device: "cuda:0"


# --- 输出路径 ---
# output_root: str, 标量
#   → run.py _run_raw_param_search_mode(output_root=...)
#   作用: 扫参结果输出根目录。存放 param_search_results.xlsx 及日志的地点。
output_root: "/home/penghongen/My_Project/feedback_plus/infer_out/标准2____job231587/标准2_protein_30"


# --- 缓存控制 ---
# cache_root: str, 标量
#   → run.py _run_raw_param_search_mode() 第 1 步缓存 logits 逻辑
#   作用: 缓存根目录。缓存路径为 {cache_root}/{ckpt_slug}/{cache_tag}/{sname}.npz，
#         其中 ckpt_slug 由 ckpt_path 自动推导 (向上2级祖先目录名_____ckpt文件stem)。
cache_root: "/home/penghongen/My_Project/feedback_plus/infer_cache/"

# cache_tag: str, 标量
#   → run.py _run_raw_param_search_mode() 第 1 步缓存 logits 逻辑
#   作用: 缓存子标签。用于区分同一 ckpt 不同推断配置 (如不同 stride/windows_size) 生成的缓存。
cache_tag: "标准2_protein_30"

# delete_cache_after_search: bool, 标量
#   → run.py _run_raw_param_search_mode() 第 5 步清理逻辑
#   作用: 搜索完毕后是否删除 npz_root 目录下的中间 `.npz` 临时缓存文件。
delete_cache_after_search: false


# --- 动态数据处理特征 ---
# target_voxel_size: float, 标量 (Å)
#   → run_raw_point_pipeline() → load_from_raw_cif() → make_model_grid()
#   作用: 实时重采样目标体素大小。决定生成网格的物理分辨率尺寸。
target_voxel_size: 1.0

# compute_density: bool, 标量
#   → run_raw_point_pipeline() → load_from_raw_cif(compute_density=...)
#   作用: 原子局部密度特征计算开关。是否将 PDB 局部密度作为额外特征通道加入。
compute_density: true

# select_first_model: bool, 标量
#   → run_raw_point_pipeline() → load_from_raw_cif(select_first_model=...)
#   作用: 单模型筛选开关。避免包含多晶体结构的 PDB 在特征空间内叠加冲突。
select_first_model: true


# --- GT 标签提取与评估参数 ---
# eval_gt: bool, 标量
#   → run.py _run_raw_param_search_mode(): 控制是否在每组参数下即时评估
#   作用: 实时伴随评估。调参必须为 true 才能搜索出最高指标。
eval_gt: true

# eval_mode: str, 标量
#   → _run_raw_param_search_mode(): 控制 GT 提取时的评估模式
#   → load_gt_from_structure(eval_mode=...)
#   作用: 评估难度模式。仅支持 "easy"、"hard" 或 "trivial"。
#     "trivial": 忽略 cif_gt_path, 完全使用 cif_path 提取配体和受体
#     "easy": cif_gt_path 仅提供配体信息, 结合位点标注基于 cif_path (预测受体)
#     "hard": cif_gt_path 同时提供配体信息和受体结构, 结合位点标注基于真实受体
#   注意: raw_param_search 模式不支持 "all"
eval_mode: "trivial"

# filter_preset: str, 标量
#   → load_gt_from_structure(filter_preset=...)
#   作用: 配体筛选预设规则。决定如何从 PDB 中筛选非蛋白质/核酸原子作为 GT 标签。
filter_preset: "five_class"

# dist_threshold: float, 标量 (Å)
#   → semantic_evaluate(dist_threshold=...)
#   作用: 点云评估命中距离阈值。预测原子点与 GT 原子点距离在此范围内视为命中。
dist_threshold: 3.0

# error_dir: str | null
#   → run_raw_point_pipeline(error_dir=...) 异常处理
#   作用: 错误日志记录目录。用于记录推断失败的具体原因或失败的 PDB 列表。
error_dir: null

# --- 以下参数已自动从训练 config.yaml 的 dataset.* 中读取 ---
# 推理时 _get_cfg() 优先读推理 YAML, 不存在则回退到训练 dataset 配置。
# 如需在推理时覆盖训练值, 可取消注释并显式设置:
# class_mapping: [0, 1, 1, 1, 1]
# atom_buffer_radius: 4.0
# valid_crop_margin: 0
# emdb_z_score: 1


# --- 推断基准参数 ---
# batch_size: int, 标量
#   → run_raw_point_pipeline(batch_size=...) → prepare_batched_boxes()
#   作用: 每个推断 batch 包含的 BOX 数。控制每次送入网络的滑窗块数量，平衡推理速度与显存占用。
batch_size: 5

# stride: int, 标量 (voxel)
#   → run_raw_point_pipeline(stride=...) → split_volume_to_boxes(stride=...)
#   作用: 滑窗步幅。立方体滑动重叠的步长。
stride: 30

# windows_size: int, 标量 (voxel)
#   → run_raw_point_pipeline(windows_size=...) → split_volume_to_boxes(window_size=...)
#   作用: 滑窗物理尺寸。决定每一次前向传播的三维块体积大小（宽深高）。须与训练 BOX 大小对齐。
windows_size: 80

# threshold: float, 标量
#   → _run_raw_param_search_mode() 初次缓存推断 + 调参默认值回退
#   作用: 语义分割二值化阈值。在未被 search_params 涵盖的情况下，控制提取掩码的切割线。
threshold: 0.5


# --- 点云推断聚合参数 ---
# 以下参数为调参的基准默认值; search_params 中同名参数会覆盖此处。

# core_decay_mode: str, 标量
#   → merge_box_atom_results(core_decay_mode=...)
#   作用: 核心区信度衰减方式。"hard" / "linear" / "none"。
core_decay_mode: "hard"

# core_offset: int, 标量 (voxel)
#   → merge_box_atom_results(core_offset=...)
#   作用: 裁边厚度。丢弃或衰减每个 Block 边缘的体素信度以规避滑窗拼接时的边界预测不准问题。
core_offset: 10

# box_spatial_weight_sigma_ratio: float, 标量
#   → merge_box_atom_results(box_spatial_weight_sigma_ratio=...)
#   作用: 高斯核 sigma 衰减率。sigma = sigma_ratio × BOX 中心到角点的距离。
#         用于融合时给距离中心较远的 logit 进行降权处理。
box_spatial_weight_sigma_ratio: 0.3

# merge_mode: str, 标量
#   → merge_box_atom_results(merge_mode=...)
#   作用: 多 BOX 原子预测聚合策略。默认 "logit_mean" 先加权平均 logit 再做 sigmoid;
#         "prob_mean" 表示先把每个 BOX 的 logit 转为 prob, 再加权平均 prob。
merge_mode: "prob_mean"

# semantic_segment_method: str, 标量
#   → point_semantic_segment(semantic_segment_method=...)
#   作用: 原子概率 → 语义分割的总入口。"threshold" 表示仅做阈值二值化;
#         "dbscan" 表示在阈值后再用 DBSCAN 去除孤立点。
semantic_segment_method: "threshold"

# dbscan_eps: float, 标量 (Å)
#   → point_semantic_segment(dbscan_eps=...)
#   作用: DBSCAN 半径参数 eps。仅在 semantic_segment_method="dbscan" 时生效。
dbscan_eps: null

# dbscan_min_samples: int, 标量
#   → point_semantic_segment(dbscan_min_samples=...)
#   作用: DBSCAN 的核心点最少邻居数。仅在 semantic_segment_method="dbscan" 时生效。
dbscan_min_samples: null


# --- 网格调参配置 ---
# search_params: dict
#   → run.py _run_raw_param_search_mode() → generate_param_grid(search_params)
#   作用: 每个键为参数名, 值为 {min, max, step} (数值范围) 或 list (候选列表)。
#         会对所有参数做笛卡尔积。
#   可搜索的参数: threshold, core_offset, core_decay_mode, merge_mode,
#                semantic_segment_method, dbscan_eps, dbscan_min_samples,
#                dist_threshold, box_spatial_weight_sigma_ratio
search_params:
  threshold:
    min: 0.15
    max: 0.35
    step: 0.01
  # merge_mode: ["logit_mean", "prob_mean"]
  # semantic_segment_method: ["threshold", "dbscan"]
  # dbscan_eps:
  #   min: 1.5
  #   max: 3.0
  #   step: 0.5
  # dbscan_min_samples:
  #   min: 1
  #   max: 5
  #   step: 1
  # core_offset:
  #   min: 0
  #   max: 4
  #   step: 1
  # core_decay_mode: ["hard", "linear", "none"]
  # box_spatial_weight_sigma_ratio:
  #   min: 0.3
  #   max: 1.0
  #   step: 0.1


# --- 可视化配置 (在最优参数下生成) ---
# vis_enable: bool, 标量
#   → _build_vis_bundle_safe(cfg_dict): 第 4 步最优参数可视化
#   作用: 可视化总开关。开启后在搜索完毕的最优参数下，为每个样本生成 PyMOL 可视化。
vis_enable: true

# vis_output_root: str | null
#   → _build_vis_bundle_safe(cfg_dict): 可视化输出根目录
#   作用: 可视化输出路径。null 则跳过可视化。
vis_output_root: "/home/penghongen/My_Project/feedback_plus/infer_vis/标准2____job231587/标准2_protein_30"

# vis_subdir: str | null
#   → _build_vis_bundle_safe(cfg_dict): 可视化子目录
#   作用: 非 null 时输出到 {vis_output_root}/[vis_subdir]/{pdb_id}/ 之下。
# vis_subdir: null


# --- Hydra 行为控制 ---
hydra:
  job:
    chdir: false
