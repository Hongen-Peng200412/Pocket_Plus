# ============================================================
# unfused_embed 数据集配置
# 继承 fused.yaml, 去掉 pdb_feature_BOX(改由 embed head 生成体素嵌入)
# 并增大 atom_buffer_radius 以支持渐进感受野裁剪
# ============================================================
defaults:
  - fused
  - _self_


name: unfused_embed

# --- 数据文件夹 ---
# 只读密度图 + 标签, 不再读离线体素化的 pdb_feature_BOX
# 体素分支的原子信息改由 embed head 在线生成
data_folder_names: ["emdb_BOX", "pdb_label_BOX"]

# --- Buffer 原子 ---
# float, 原子 buffer 半径(Å); 设为正值以支持 embed head 的渐进裁剪
# embed head 的 trunk_buffer_radii / voxel_buffer_radii 应当 <= 此值
atom_buffer_radius: 0.0

valid_crop_margin: 0.0
