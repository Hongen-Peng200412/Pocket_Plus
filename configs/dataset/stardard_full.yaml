# ============================================================
# standard: 含 random_BOX 负样本的数据集配置
# 此文件以 cfg.dataset.* 的形式被 train.py 的 UnifiedDataModule 使用
# 数据依赖:
#   a. 需先运行 split_and_select_box.py 生成 random_BOX 目录中的 npz 数据
#      (split_and_select_box.py 的 sample_box_num 参数需 > 0)
#   b. 需先运行 generate_full_json.py 生成 random_BOX 的 split JSON 文件
#      (generate_full_json.py 的 collect_box_stems_per_class 已支持自动发现 random_BOX 子目录)
#
# class_mapping 说明:
#   - 5 个条目对应 label 体素值 0-4:
#     0=背景, 1=metal_ion, 2=peptide, 3=nucleic, 4=small_molecule
#   - 与文件夹数量无关，random_BOX 使用完全相同的 class_mapping
#   - 例子: [0,1,0,0,1] 表示只把 metal_ion(1) 和 small_molecule(4) 视为前景
# ============================================================
_target_: src.datasets.box_point_dataset.BoxPointDataset

name: stardard_full

# --- 数据根目录路径 (允许 train/val 分别指定) ---
all_data_path: "/storage/penghongen/Pocket_classic/v2_raw4_10A"
sample_root_path: "/home/penghongen/My_Project/Data/DATA_v2_raw4/parsed_pdb"

data_folder_names: ["emdb_exp_BOX", "emdb_sim_BOX", "pdb_label_BOX"]
class_folder_names: ["metal_ion", "peptide", "nucleic", "small_molecule", "random_BOX"]

density_channel_config:
  clip_percentile: [0.001, 0.999]
  fit_mask_percentile: 0.003
  enabled_channels:
    - "all"





# --- 标签映射 (Label Mapping) ---
# 5 个条目对应体素值 0-4，与 fused.yaml 完全一致，不因新增 random_BOX 目录而改变
class_mapping: [0, 1, 1, 1, 1]



# --- 数据划分文件路径 ---
# split_train / split_val 在 train.py 的 UnifiedDataModule.setup() 中被显式读取
split_train: [
  "/storage/penghongen/Pocket_classic/v2_raw4_10A/split/split_3/metal_ion/train_050.json",
  "/storage/penghongen/Pocket_classic/v2_raw4_10A/split/split_3/peptide/train_050.json",
  "/storage/penghongen/Pocket_classic/v2_raw4_10A/split/split_3/nucleic/train_050.json",
  "/storage/penghongen/Pocket_classic/v2_raw4_10A/split/split_3/small_molecule/train_050.json",
  "/storage/penghongen/Pocket_classic/v2_raw4_10A/split/split_3/random_BOX/train_050.json"   # 需先用 generate_full_json.py 生成
]

split_val: [
  "/storage/penghongen/Pocket_classic/v2_raw4_10A/split/split_3/metal_ion/val.json",
  "/storage/penghongen/Pocket_classic/v2_raw4_10A/split/split_3/peptide/val.json",
  "/storage/penghongen/Pocket_classic/v2_raw4_10A/split/split_3/nucleic/val.json",
  "/storage/penghongen/Pocket_classic/v2_raw4_10A/split/split_3/small_molecule/val.json",
  "/storage/penghongen/Pocket_classic/v2_raw4_10A/split/split_3/random_BOX/val.json"    # 需先用 generate_full_json.py 生成
]




atom_buffer_radius: 0.0  # A为单位
cache_size: 128  
valid_crop_margin: 0     # 体素为单位
enable_random_rotation: true



# 在 configs\train 里统一控制采样器 src\datasets\balanced_foreground_sampler.py 的表现

