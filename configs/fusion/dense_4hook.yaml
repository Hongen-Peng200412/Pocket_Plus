# @package model
# 融合逻辑配置: Dense 4-hook (默认) — 4 层级融合
backbone:
  point_fusion_map:
    point_enc2: voxel_ds_2         # 编码器第 2 层
    point_enc3: voxel_ds_3         # 编码器第 3 层
    point_enc4: voxel_c4           # 编码器第 4 层
    point_feat: voxel_final        # 最终输出

  point_fusion_modes: ["concat_linear", "concat_linear", "concat_linear", "concat_linear"]
  sampler_modes: ["trilinear", "trilinear", "trilinear", "trilinear"]
  fusion_mlp_ratio: 2.0           # float, 融合 MLP 膨胀倍率
  fusion_proj_drop: 0.2           # float, 融合层 dropout
