# ============================================================
# Hydra 根配置 (所有实验的基础)
# ============================================================
# 此文件是 Hydra 的顶层入口, 即使使用 sbatch 脚本也必须存在. 但是本文件可以完全不动——————它就是被 override 的
# 用法:
#   python Pocket_Plus/src/train.py +experiment=exp001_baseline
#   sbatch sbatch/h200/1gpu.sbatch "+experiment=exp001_baseline"
# ============================================================

defaults:
  # --- 模型骨架 ---
  - model: default                             # Wrapper/_target_/recycle 等结构参数

  # --- 模型子模块 (各自独立可替换) ---
  - model/voxel_backbone: raunet_64            # 体素分支
  - model/point_backbone: ptv3_dense           # 点云分支
  - model/fusion: dense_4hook                  # 融合逻辑
  - model/atom_head: 4layer                    # atom head
  - model/pseudo_atom: none                    # 伪原子(默认关闭)
  - model/embed_head: none                     # embed head(默认关闭)

  # --- 损失函数 ---
  - loss: focal_default                        # Focal Loss

  # --- 数据 / 后处理 / 输出 ---
  - dataset: fused
  - post_process: none
  - output: standard

  # --- 训练超参数 ---
  - train: default_h100

  - _self_


# --- 全局标签(由 experiment 覆盖) ---
name: base
tag: "默认"
project_name: PV_default

# --- 运行控制 ---
min_duration: 0
keep_short_runs: true
offline: false
migrate_slurm_logs: false

hydra:
  output_subdir: null
  run:
    dir: .
  job:
    chdir: false
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.override_dirname}
