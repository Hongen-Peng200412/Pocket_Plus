# ============================================================
# 主配置入口点: sparse_h100
# ============================================================
# 通过 Hydra defaults 组合: model + 各子模块 + dataset + loss + train
# 每个子模块都是独立的 config group, 可以独立替换
# ============================================================

defaults:
  # --- 模型名称 ---
  - model: sparse                  # 模型名称标识
  - base                           # 模型公共基础(Wrapper _target_, recycle 等)

  # --- 模型子模块 (各自可替换) ---
  - voxel: raunet_64               # 体素分支 → configs/voxel/raunet_64.yaml
  - point: ptv3_dense              # 点云分支 → configs/point/ptv3_dense.yaml
  - fusion: dense_4hook            # 融合逻辑 → configs/fusion/dense_4hook.yaml
  - atom_head: 4layer              # atom head → configs/atom_head/4layer.yaml
  - pseudo_atom: none              # 伪原子   → configs/pseudo_atom/none.yaml
  - embed_head: none               # embed head → configs/embed_head/none.yaml

  # --- 损失函数 ---
  - loss: focal_default            # 损失函数 → configs/loss/focal_default.yaml

  # --- 数据源 ---
  - dataset: fused                 # 数据集

  # --- 后处理 / 输出 ---
  - post_process: none
  - output: standard

  # --- 训练超参数 ---
  - train: default_h100

  - _self_


# --- 全局标签 ---
name: sparse_h100
tag: "稀疏"
project_name: PV_sparse_fused

# --- 运行控制 ---
min_duration: 0
keep_short_runs: true
offline: false
migrate_slurm_logs: false

hydra:
  output_subdir: null
  run:
    dir: .
  job:
    chdir: false
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.override_dirname}
