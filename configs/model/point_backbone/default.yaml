# @package _global_
# 点云分支变体: PTV3 Dense (基线)
model:
  backbone:
    point_backbone:
      _target_: src.model.stage1_point_backbone.Stage1PointBackbone
      backend: ptv3                  # str, "ptv3" / "zeros"(消融用全零)
      atom_feature_dim: 49           # int, 原子原始特征维度; 与数据集 atom_feat 通道一致
                                     #   选择 embed_head/default.yaml 时会自动覆盖为 embed_point_out_channels
      point_grid_size: 0.25          # float, 离散化粒度(Å)

      # --- 输入嵌入 ---
      input_embed_dim: 64            # int, 嵌入层输出维度
      input_embed_hidden_dim: 128    # int, 嵌入层隐藏维度
      out_channels: 64               # int, 点分支最终输出通道数
      recycle_feature_dim: 64        # int, recycle 特征维度
      recycle_in_norm_mode: layernorm  # str, 对上一轮 point recycle_out 先做归一化再投影; "layernorm" / "none"

      # --- 序列化 ---
      serialization_orders: ["z", "z-trans", "hilbert", "hilbert-trans"]
      shuffle_orders: true           # bool, 训练时随机打乱序列化顺序

      # --- 编码器/解码器 ---
      stride: [4, 2, 2, 2]          # list[int], 各层下采样步幅
      enc_depths: [2, 2, 2, 6, 2]   # list[int], 编码器每层 Block 数
      enc_channels: [64, 64, 128, 256, 512]
      enc_num_head: [2, 4, 8, 16, 32]
      enc_patch_size: [256, 128, 96, 72, 64]
      dec_depths: [2, 2, 2, 2, 0]   # list[int], 解码器; dec4=0 跳过最低分辨率(旧版兼容)
      dec_channels: [64, 64, 128, 256, 512]
      dec_num_head: [4, 4, 8, 16, 32]
      dec_patch_size: [128, 96, 72, 64, 64]

      # --- 嵌入层 ---
      embedding_kernel_size: 5       # int, sparseconv 卷积核
      embedding_impl: pointconv      # str, "sparseconv" / "pointconv"
      embedding_receptive_field: 5.0 # float, pointconv 感受野(Å)
      pointconv_embed_max_neighbors: 64

      # --- CPE ---
      cpe_impl: pointconv            # str, Block CPE: "sparseconv" / "pointconv"
      pointconv_block_max_neighbors: 32
      enc_cpe_kernel_size: [5, 5, 5, 5, 5]
      dec_cpe_kernel_size: [5, 5, 5, 5, 5]
      enc_cpe_receptive_field: [2.0, 2.0, 8.0, 12.0, 16.0]
      dec_cpe_receptive_field: [2.0, 2.0, 8.0, 12.0, 16.0]

      # --- 注意力与正则化 ---
      mlp_ratio: 4                   # int, FFN 膨胀倍率
      qkv_bias: true
      qk_scale: null
      attn_drop: 0.2                 # float, 注意力 dropout
      proj_drop: 0.2                 # float, 投影 dropout
      drop_path: 0.3                 # float, 随机深度 drop 概率
      pre_norm: true
      enable_rpe: false
      enable_flash: false
      upcast_attention: false
      upcast_softmax: false

      # --- PD-Norm ---
      cls_mode: false
      pdnorm_bn: false
      pdnorm_ln: false
      pdnorm_decouple: true
      pdnorm_adaptive: false
      pdnorm_affine: true
      pdnorm_conditions: ["ScanNet", "S3DIS", "Structured3D"]
      act_layer_name: ${model.backbone.act_layer_name}         # str, 激活函数 (由 configs/experiment 覆盖)
      ffn_type: ${model.backbone.ffn_type}                     # str, FFN 类型 (由 configs/experiment 覆盖)
