# ============================================================
# sparse_embed 模型配置
# 继承 sparse.yaml, 新增 embed head 前置模块
# 此文件的所有配置项以 cfg.model.* 的形式被 train.py 和 Wrapper 使用
# ============================================================
defaults:
  - sparse
  - _self_


name: sparse_embed

backbone:
  # --- Embed Head (前置模块) ---
  # embed head 接收原子特征, 在点上做共享编码后:
  #   1. scatter 到体素网格 → voxel_pdb_embed_grid, 与密度图 concat 送入体素分支
  #   2. (可选) 输出 per-atom 特征, 通过残差加和融合到 atom_feat 后送入点分支
  #   3. 作为过滤器: 裁剪后的原子字段替换 batch, 下游模块使用裁剪后的数据
  #   → stage1_model.py: VolumePointStage1Model.forward() 在 recycle 循环外调用
  embed_head:
    _target_: src.model.stage1_embed_head.Stage1EmbedHead

    atom_feature_dim: 49         # int, 原子原始特征维度; 必须与数据集 atom_feat 通道一致
    embed_hidden_dim: 64         # int, 共享 trunk 内部隐藏通道数
    embed_voxel_out_channels: 16 # int, scatter 到体素网格后的输出通道数;
                                 #   体素分支最终输入 = EMDB 通道数 + 此值
    embed_point_out_channels: 64 # int, 输出给点分支的 per-atom 特征通道数;
                                 #   0 表示不输出(仅做体素嵌入)
                                 #   > 0 时: 通过 embed_point_gate * Linear 残差加和到 atom_feat

    # --- Block 数量 ---
    num_trunk_blocks: 3          # int, 共享 trunk block 数
    num_voxel_blocks: 2          # int, 体素分支专用 block 数
    num_point_blocks: 2          # int, 点分支专用 block 数(仅 embed_point_out_channels > 0 时生效)

    # --- 渐进感受野裁剪 ---
    # 每个 block 后允许的 buffer 半径(Å, 世界坐标单位)
    # 经过该 block 后, 距 core box 边界 > 此值的 buffer 原子将被裁剪
    # 设为 inf 则不裁剪
    trunk_buffer_radii: [8.0, 6.0, 4.0]   # list[float], 长度=num_trunk_blocks
    voxel_buffer_radii: [3.0, 2.0]         # list[float], 长度=num_voxel_blocks
    point_buffer_radii: [3.0, 2.0]         # list[float], 长度=num_point_blocks

    # --- 注意力参数 ---
    num_heads: 4                 # int, 注意力头数
    patch_size: 128              # int, SerializedAttention patch 大小
    serialization_orders: ["z", "z-trans", "hilbert", "hilbert-trans"]  # list[str], 序列化顺序
    shuffle_orders: true         # bool, 训练时是否随机打乱序列化顺序
    qkv_bias: true               # bool, QKV 线性层是否带 bias
    qk_scale: null               # float|null, QK 缩放因子; null=自动
    attn_drop: 0.1               # float, 注意力 dropout
    proj_drop: 0.1               # float, 输出投影 dropout
    enable_rpe: false            # bool, 是否启用相对位置编码
    enable_flash: false          # bool, 是否启用 flash attention
    upcast_attention: false      # bool, 是否在注意力计算前上转精度
    upcast_softmax: false        # bool, 是否在 softmax 前上转精度

    # --- FFN 与激活 ---
    ffn_type: "mlp"              # str, FFN 类型: "mlp"(经典MLP) / "gated"(SwiGLU) / "none"(无FFN)
    mlp_ratio: 4                 # int, FFN 隐藏层膨胀倍率(仅 ffn_type != "none" 生效)
    act_layer_name: "gelu"       # str, 激活函数类型: "gelu"/"silu"/"relu"/"leakyrelu"

    # --- 聚合方式 ---
    scatter_reduce: "mean"       # str, per-atom → voxel 聚合方式: "mean" 或 "sum"

    # --- Block 新增参数 ---
    point_grid_size: 0.25        # float, embed head 内部 Point 离散化粒度; 建议与点分支一致
    cpe_impl: "none"             # str, Block 的 CPE 实现方式: "none"/"sparseconv"/"pointconv"
    cpe_kernel_size: 5           # int, sparseconv CPE 卷积核大小(仅 cpe_impl="sparseconv" 时生效)
    cpe_receptive_field: 2.0     # float, pointconv CPE 感受野半径(Å)(仅 cpe_impl="pointconv" 时生效)
    pointconv_block_max_neighbors: 16  # int, pointconv CPE 每个点最大邻居数(仅 cpe_impl="pointconv" 时生效)
    drop_path: 0.0               # float, 随机深度(stochastic depth) drop 概率
    pre_norm: true               # bool, 是否使用预归一化(pre-LN)

  # --- 点分支 ---
  # NOTE: embed head 启用时, atom_feat 被投影到 embed_point_out_channels 维度后再与 embed 特征融合
  #   因此 atom_feature_dim = embed_point_out_channels
  point_backbone:
    atom_feature_dim: 64         # int, 融合后特征维度(= embed_point_out_channels)
