# @package _global_
# 同时严格了伪原子的分布、pos改为all
model:
  backbone:
    pseudo_atom_cfg:
      base_count: 128               # int, 固定基数
      scale_factor: 0.4            # float, 比例系数 k
      max_sample_rounds: 10         # int, 采样-删除循环最大轮次
      init_feat_mode: "zero"       # str, "zero" / "neighbor_mean", 初始化伪原子特征
      init_feat_noise_std: 0.1
      neighbor_radius: 3.0         # float, 邻域半径(Å), "neighbor_mean" 模式下确定伪原子特征
      enable_density_weighting: false   # bool, 启用密度加权
      density_channel_index: 0
      density_prob_base: 0.1       # float, unnorm_prob = 0.1 + density_value
      delete_too_close_radius: 2.0 # float, r0=2.0Å 聚类稀疏化
      delete_too_far_radius: 8.0   # float, r1=8.0Å 距离过滤
      lifecycle: [false, true, false]  # list[bool], 长度=3, 依次表示 [embed_head, point_backbone, atom_head] 三个阶段是否存在伪原子

      # --- recycle 语义控制 ---
      recycle_policy: "pos"                   # str, recycle 中伪原子的跨轮保留策略
                                              # 可选: "non" | "pos" | "all"
                                              # → src/model/pseudo_atoms.py: PseudoAtomGenerator.__init__
                                              # → src/model/stage1_model.py: VolumePointStage1Model.forward
