# @package _global_
# 伪原子变体: 密度加权采样 64 个
model:
  backbone:
    pseudo_atom_cfg:
      base_count: 64               # int, 固定基数
      scale_factor: 0.3            # float, 比例系数 k
      max_sample_rounds: 3         # int, 采样-删除循环最大轮次
      init_feat_mode: "zero"       # str, 全零特征
      init_feat_noise_std: 0.0
      neighbor_radius: 3.0         # float, 邻域半径(Å)
      enable_density_weighting: true   # bool, 启用密度加权
      density_channel_index: 0
      density_prob_base: 0.1       # float, unnorm_prob = 0.1 + density_value
      delete_too_close_radius: 1.5 # float, r0=1.5Å 聚类稀疏化
      delete_too_far_radius: 8.0   # float, r1=8.0Å 距离过滤
      lifecycle: [false, true, true]
