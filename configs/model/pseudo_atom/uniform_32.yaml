# @package _global_
# 伪原子变体: 均匀采样 32 个
model:
  backbone:
    pseudo_atom_cfg:
      base_count: 32               # int, 固定基数 b; 每 BOX 至少 32 个
      scale_factor: 0.5            # float, 比例系数 k; 目标数 = b + k × N_real
      max_sample_rounds: 3         # int, 采样-删除循环最大轮次
      init_feat_mode: "zero"       # str, "zero"(全零) / "neighbor_mean"(邻域均值)
      init_feat_noise_std: 0.0     # float, 高斯噪声标准差; 0=无噪声
      neighbor_radius: 3.0         # float, "neighbor_mean" 邻域半径(Å)
      enable_density_weighting: false  # bool, 不启用密度加权
      density_channel_index: 0     # int, 差图通道索引
      density_prob_base: 0.1       # float, 密度概率基底
      delete_too_close_radius: 0.0 # float, r0=0 不启用聚类稀疏化
      delete_too_far_radius: 0.0   # float, r1=0 不启用距离过滤
      lifecycle: [false, true, true]  # list[bool], [embed_head, point_backbone, atom_head]
