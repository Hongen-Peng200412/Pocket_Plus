# @package _global_
# 减小层数、mlp_ratio，增大 patch_size
# ── 搭配 unfused_embed.yaml → voxel_backbone 看到 EMDB + embed 36ch
model:
  backbone:
    embed_head:
      _target_: src.model.stage1_embed_head.Stage1EmbedHead
      atom_feature_dim: 49         # int, 原子原始特征维度
      embed_hidden_dim: 128         # int, 共享 trunk 隐藏通道数
      embed_voxel_out_channels: 36 # int, scatter 到体素网格后的通道数
      embed_point_out_channels: 64 # int, 输出给点分支的通道数
      num_trunk_blocks: 0          # int, 共享 trunk block 数 (0=跳过 trunk)
      num_voxel_blocks: 2          # int, 体素分支 block 数
      num_point_blocks: 2          # int, 点分支 block 数
      trunk_buffer_radii: []
      voxel_buffer_radii: [0.0, 0.0]
      point_buffer_radii: [0.0, 0.0]
      num_heads: 4
      patch_size: 256
      serialization_orders: ["z", "z-trans", "hilbert", "hilbert-trans"]
      shuffle_orders: true
      qkv_bias: true
      qk_scale: null
      attn_drop: 0.2
      proj_drop: 0.2
      enable_rpe: false
      enable_flash: true
      upcast_attention: false
      upcast_softmax: false
      ffn_type: ${model.backbone.ffn_type}               # str, FFN 类型 (由 configs/experiment 覆盖)
      mlp_ratio: 3
      act_layer_name: ${model.backbone.act_layer_name}   # str, 激活函数 (由 configs/experiment 覆盖)
      scatter_reduce: "mean"       # str, per-atom → voxel 聚合方式
      point_grid_size: 0.25
      cpe_impl: "pointconv"
      cpe_kernel_size: 5
      cpe_receptive_field: 2.0
      pointconv_block_max_neighbors: 64
      drop_path: 0.2
      pre_norm: true
      embed_residual_enabled: true       # bool, 是否启用残差融合   # true
      embed_point_gate_enabled: false     # bool, point 路径 gate 是否可学习
      embed_voxel_gate_enabled: false     # bool, voxel 路径 gate 是否可学习
      add_occupancy_channels: false       # bool, 是否添加 occupancy 通道  # false
      use_soft_splatting: false           # bool, 是否使用 soft splatting # false
      use_centroid_encoding: false        # bool, 是否使用 centroid-aware 偏移编码 # false

    # embed head 启用时, 点分支 atom_feature_dim = embed_point_out_channels
    point_backbone:
      atom_feature_dim: 64
