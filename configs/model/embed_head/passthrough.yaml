# @package _global_
# ============================================================
# Embed Head: 透传模式 (基线)
# ── has_voxel_output=False, has_point_output=False
# ── 不构建任何 block, 不向体素/点分支注入 embed 特征
# ── 搭配 online_pdb_feature=true 时, voxel_backbone 可看到 EMDB + 在线 raw 49ch
# ── 搭配 online_pdb_feature=false 时, voxel_backbone 仅看到 EMDB 密度通道
# ============================================================
model:
  backbone:
    embed_head:
      _target_: src.model.stage1_embed_head.Stage1EmbedHead
      atom_feature_dim: 49         # int, 原子原始特征维度
      embed_hidden_dim: 64         # int, 共享 trunk 隐藏通道数 (透传模式下不实际使用, 但需合法值)
      embed_voxel_out_channels: 0  # int, 0=不输出体素嵌入 (has_voxel_output=False)
      embed_point_out_channels: 0  # int, 0=不输出点特征 (has_point_output=False)
      num_trunk_blocks: 0          # int, 共享 trunk block 数
      num_voxel_blocks: 0          # int, 体素分支 block 数
      num_point_blocks: 0          # int, 点分支 block 数
      trunk_buffer_radii: []
      voxel_buffer_radii: []
      point_buffer_radii: []
      num_heads: 4
      patch_size: 256
      serialization_orders: ["z", "z-trans", "hilbert", "hilbert-trans"]
      shuffle_orders: false
      qkv_bias: true
      qk_scale: null
      attn_drop: 0.0
      proj_drop: 0.0
      enable_rpe: false
      enable_flash: true
      upcast_attention: false
      upcast_softmax: false
      ffn_type: ${model.backbone.ffn_type}
      mlp_ratio: 3
      act_layer_name: ${model.backbone.act_layer_name}
      scatter_reduce: "sum"
      point_grid_size: 0.25
      cpe_impl: "none"
      cpe_kernel_size: 5
      cpe_receptive_field: 2.0
      pointconv_block_max_neighbors: 16
      drop_path: 0.0
      pre_norm: true
      embed_residual_enabled: false
      embed_point_gate_enabled: false
      embed_voxel_gate_enabled: false
      add_occupancy_channels: false
      use_soft_splatting: false
      use_centroid_encoding: false
