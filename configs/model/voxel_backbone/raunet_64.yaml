# @package _global_
# 体素分支变体: RAUNet-64 (基线)
model:
  backbone:
    voxel_backbone:
      _target_: src.model.stage1_voxel_backbone.Stage1VoxelBackbone
      in_channels: null              # int|null, 输入通道数; null=运行时自动推断
      feature_channels: 64           # int, 内部特征通道数基准
      planes: [64, 256, 256, 256, 256, 256, 128, 64, 64]
                                     # list[int], RAUNet 各层通道数
                                     #   映射: (enc0, enc1, enc2, enc3, bottleneck, dec3, dec2, dec1, dec0)
      gradient_checkpoint: true      # bool, 梯度检查点以节省显存
      return_feature_keys: ["voxel_ds_2", "voxel_ds_3", "voxel_c4", "voxel_final"]
                                     # list[str], 返回的中间特征名称; 被 point_fusion_map 引用
      aux_head_hidden_channels: 32   # int, 辅助分类头隐藏通道数
