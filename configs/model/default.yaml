# ============================================================
# 模型骨架配置 (结构性参数)
# ============================================================
# 此文件由 base.yaml 的 defaults 中 "- model: default" 引用
# 即使使用 sbatch 脚本也必须存在, 它为 Hydra 提供模型的结构参数
# 所有可调的子模块参数由 config group 文件提供, 不在此处定义
# ============================================================

name: default

# _target_: str, Wrapper 类; Hydra 据此实例化 Wrapper
_target_: src.wrappers.voxel_point_stage1.VoxelPointStage1Wrapper

backbone:
  _target_: src.model.stage1_model.VolumePointStage1Model
  atom_logit_dim: 1
  enable_recycling: false
  max_recycles: 1
  randomize_recycles: false
  detach_recycle_states: true
  act_layer_name: "gelu"
  ffn_type: "mlp"
  atom_head_ffn_type: "mlp"
  prior_prob: 0.01  # see me: 注意需要启用

  # --- 在线 pdb_feature ---
  # 仅在 embed_head 未启用时生效; embed_head 启用时 forward() 的 elif 结构自动跳过
  online_pdb_feature: false           # bool, 是否在线 scatter raw atom_feat 到体素网格
  online_pdb_feature_reduce: "sum"    # str, scatter 聚合方式
  online_pdb_feature_dim: 49          # int, 原子原始特征维度

# --- 调度器行为 ---  
interval: "step"                   # str, 调度器更新间隔
frequency: 1                       # int, 更新频率
monitor_metric: val/atom_pr_auc    # str, 监控指标
monitor_mode: max                  # str, "max" / "min"
voxel_ligand_pr_auc_thresholds: 4096  # int | null, higher-resolution binned ligand PR-AUC
compile: false                     # bool, torch.compile
