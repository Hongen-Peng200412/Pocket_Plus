# @package model
backbone:
  embed_head:
    _target_: src.model.stage1_embed_head.Stage1EmbedHead
    atom_feature_dim: 49
    embed_hidden_dim: 64
    embed_voxel_out_channels: 16
    embed_point_out_channels: 64
    num_trunk_blocks: 3
    num_voxel_blocks: 2
    num_point_blocks: 2
    trunk_buffer_radii: [8.0, 6.0, 4.0]
    voxel_buffer_radii: [3.0, 2.0]
    point_buffer_radii: [3.0, 2.0]
    num_heads: 4
    patch_size: 128
    serialization_orders: ["z", "z-trans", "hilbert", "hilbert-trans"]
    shuffle_orders: true
    qkv_bias: true
    qk_scale: null
    attn_drop: 0.1
    proj_drop: 0.1
    enable_rpe: false
    enable_flash: false
    upcast_attention: false
    upcast_softmax: false
    ffn_type: "mlp"
    mlp_ratio: 4
    act_layer_name: "gelu"
    scatter_reduce: "mean"
    point_grid_size: 0.25
    cpe_impl: "none"
    cpe_kernel_size: 5
    cpe_receptive_field: 2.0
    pointconv_block_max_neighbors: 16
    drop_path: 0.0
    pre_norm: true

  # NOTE: embed head 启用时, 点分支 atom_feature_dim = embed_point_out_channels
  point_backbone:
    atom_feature_dim: 64
