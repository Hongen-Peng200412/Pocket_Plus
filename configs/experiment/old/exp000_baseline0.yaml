# @package _global_
# ============================================================
# 实验: 最强组合 — embed_head=plus + 在线 pdb_feature
# ============================================================
# 搭配 plus.yaml embed head + unfused_embed 数据集:
#   voxel_backbone 看到 EMDB + embed 49ch + occupancy 2ch
#   (pdb_feature 由 embed head 的 voxel_pdb_embed_grid 在线生成,
#    model.backbone.online_pdb_feature 被 elif 自动跳过)
#
# 基于新版数据 (emdb_exp_BOX)
# ============================================================
# 用法:
#   sbatch sbatch/h200/1gpu.sbatch "+experiment=exp000_baseline0"
# ============================================================

defaults:
  - override /model/voxel_backbone: default       # 体素分支: RAUNet-64
  - override /model/point_backbone: stardard       # 点云分支: PTV3 Dense
  - override /model/fusion: e234d4                 # 融合: 4 层级全融合
  - override /model/atom_head: stardard            # Atom Head: 4 层
  - override /model/pseudo_atom: 64_2_non            # 伪原子
  - override /model/embed_head: plus               # Embed Head: plus (残差 + soft splatting + centroid)
  - override /loss: receptor                  # 损失
  - override /dataset: stardard_medium               # 数据集: 无离线 pdb_feature, embed head 在线生成
  - override /train: B40_L3                        # 训练: H200 参数


# --- 实验标识 ---
name: exp000_ligand0
tag: "exp000"
experiment_group: "atom_plus"              # str, run_dir 父文件夹名称
project_name: PV_plus                 # wandb 的项目名称

# --- 模型总体参数 ---
model:
  backbone:
    # --- Logit 输出 ---
    atom_logit_dim: 1                # int, atom 分类 logit 维度; 二分类=1

    # --- Recycle 机制 ---
    enable_recycling: true           # bool, 启用 recycle 循环(多轮迭代精化)
    max_recycles: 3                  # int, 最大 recycle 轮数
    randomize_recycles: true         # bool, 训练时在 [1, max_recycles] 内随机
    detach_recycle_states: true      # bool, 跨轮截断梯度

    # --- 统一激活函数 (全局源头, 子模块通过插值引用) ---
    act_layer_name: "gelu"           # str, "gelu"/"silu"/"relu"/"leakyrelu"
    ffn_type: "gated"                # str, PTV3 Block FFN: "mlp" / "gated"
    atom_head_ffn_type: "gated"      # str, atom head 可选 FFN: "mlp" / "gated" / "none"
