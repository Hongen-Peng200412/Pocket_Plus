# ============================================================
# Training Hyperparameters
# Used as cfg.train.* by train.py and Lightning wrappers.
# ============================================================

# --- DataLoader ---
global_batch_size: 36
tuning_init_batch_size: 5
batch_size: ${train.tuning_init_batch_size}
batch_size_tuning_safety_factor: 0.8
num_workers: 20
dataloader_backend: auto
pin_memory: true

# --- Data Fault Tolerance ---
data_fault_tolerance:
  enabled: true
  stages:
    - train
    - val
  max_resample_attempts: 8
  sample_timeout_sec: 20
  log_first_n: 50

# --- Trainer ---
nnodes: 1
devices: 1
max_epochs: 100
accelerator: auto
ddp_find_unused_parameters: false
precision: "bf16-mixed"
gradient_clip_val: 0.5
check_val_every_n_epoch: 1
log_every_n_steps: 3

# --- Optimizer ---
optimizer:
  _target_: torch.optim.AdamW
  _partial_: true
  lr: 2.0e-5
  weight_decay: 0.01

# --- LR Scheduler ---
scheduler: null
